  <script>
    // If opened from GitHub Pages, unregister SW and redirect to Netlify
    if(window.location.hostname.includes('github.io')) {
      if('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          return Promise.all(regs.map(function(r){ return r.unregister(); }));
        }).then(function() {
          window.location.replace('https://ciliegio-shop.netlify.app/CiliegioShop.html');
        });
      } else {
        window.location.replace('https://ciliegio-shop.netlify.app/CiliegioShop.html');
      }
    }

    // Service Worker — register directly (no unregister loop that causes reload on iOS PWA)
    if(!window.location.hostname.includes('github.io') && 'serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js?v=91').then(function(reg) {
        reg.addEventListener('updatefound', function() {
          var newWorker = reg.installing;
          newWorker.addEventListener('statechange', function() {
            // Only reload when there was already an active controller (i.e. this is a real update,
            // not the very first SW install — avoids an extra reload on first visit)
            if(newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              window.location.reload();
            }
          });
        });
      });

      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if(!refreshing) { refreshing = true; window.location.reload(); }
      });
    }
  </script>
  <!-- Google Analytics 4 — caricato SOLO dopo consenso cookie (vedi banner in app) -->
  <script>
    window.enableAnalytics = function(){
      if(window._gaLoaded) return;
      window._gaLoaded = true;

      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-QY93H4QWVG';
      document.head.appendChild(s);

      window.dataLayer = window.dataLayer || [];
      window.gtag = function(){dataLayer.push(arguments);};
      gtag('js', new Date());
      gtag('config', 'G-QY93H4QWVG');

      // Detect and send device type
      var _device=/iphone|ipad|ipod/i.test(navigator.userAgent)?'iOS':/android/i.test(navigator.userAgent)?'Android':'Desktop';
      gtag('set','user_properties',{device_type:_device});
      var _isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
      gtag('set','user_properties',{pwa_installed:_isStandalone?'yes':'no'});

      // Track if opened in standalone mode (installed PWA)
      if(_isStandalone){
        gtag('event', 'app_opened_standalone', {event_category: 'PWA', event_label: _device+' - Opened from icon'});
      }

      // Track app installation
      window.addEventListener('appinstalled', function(){
        gtag('event', 'app_installed', {event_category: 'PWA', event_label: _device+' - Installed'});
      });
    };

    // Se il consenso era già stato accettato in una sessione precedente, riattiva GA da subito
    if(localStorage.getItem('ciliegio_cookie_consent')==='accepted'){
      window.enableAnalytics();
    }

  // Load Babel only after React is confirmed available
  function loadBabel() {
    if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
      setTimeout(loadBabel, 50);
      return;
    }
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js';
    s.onload = function() {
      // Find and transform all text/babel scripts manually
      document.querySelectorAll('script[type="text/babel"]').forEach(function(script) {
        var code = Babel.transform(script.innerHTML, {presets: ['react']}).code;
        var newScript = document.createElement('script');
        newScript.textContent = code;
        document.body.appendChild(newScript);
      });
    };
    document.head.appendChild(s);
  }
  document.addEventListener('DOMContentLoaded', loadBabel);
</script>

function effectiveUnits(item){

}

const SUPPORTED_LANGS = ['it','en','de','fr','es'];

// Bandiere disegnate via SVG (non dipendono dal font emoji del dispositivo)
function FlagIcon({code,size}){
  const w=size||20, h=Math.round(w*0.72);
  const flags = {
    it:[['#009246',0,0,1/3],['#fff',1/3,0,1/3],['#ce2b37',2/3,0,1/3]], // vertical stripes
    fr:[['#0055A4',0,0,1/3],['#fff',1/3,0,1/3],['#EF4135',2/3,0,1/3]],
    de:null, es:null, en:null,
  };
  if(code==='de'){
    return(<svg width={w} height={h} viewBox="0 0 3 2" style={{borderRadius:'2px',display:'block'}}>
      <rect width="3" height="2" fill="#000"/><rect width="3" height="1.333" y="0.667" fill="#DD0000"/><rect width="3" height="0.667" y="1.333" fill="#FFCE00"/>
    </svg>);
  }
  if(code==='es'){
    return(<svg width={w} height={h} viewBox="0 0 3 2" style={{borderRadius:'2px',display:'block'}}>
      <rect width="3" height="2" fill="#AA151B"/><rect width="3" height="1" y="0.5" fill="#F1BF00"/>
    </svg>);
  }
  if(code==='en'){
    return(<svg width={w} height={h} viewBox="0 0 30 20" style={{borderRadius:'2px',display:'block'}}>
      <rect width="30" height="20" fill="#00247d"/>
      <path d="M0,0 L30,20 M30,0 L0,20" stroke="#fff" strokeWidth="4"/>
      <path d="M0,0 L30,20 M30,0 L0,20" stroke="#cf142b" strokeWidth="2"/>
      <path d="M15,0 V20 M0,10 H30" stroke="#fff" strokeWidth="6"/>
      <path d="M15,0 V20 M0,10 H30" stroke="#cf142b" strokeWidth="3.6"/>
    </svg>);
  }
  const stripes = flags[code];
  return(<svg width={w} height={h} viewBox="0 0 3 2" style={{borderRadius:'2px',display:'block'}}>
    {stripes.map(([c,x],i)=><rect key={i} x={x*3} width={1} height={2} fill={c}/>)}
  </svg>);
}
function detectLang(){
  const saved = localStorage.getItem('ciliegio_lang');
  if(saved && SUPPORTED_LANGS.includes(saved)) return saved;
  const langs = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language||'en'];
  for(const l of langs){
    const code = l.slice(0,2).toLowerCase();
    if(SUPPORTED_LANGS.includes(code)) return code;
  }
  return 'en';
}

/* ── Helpers ───────────────────────────────────────────────── */
function shipRate(obj,qty){
  if(!obj) return 0;
  const t=QTY_TIERS.find(t=>qty<=t)||QTY_TIERS[QTY_TIERS.length-1];
  return parseFloat(obj.rates[String(t)])||0;
}
function dLabel(key,speed,rateObj){
  if(!key) return '';
  // Read from shipping.json if available
  if(rateObj&&rateObj.delivery) return rateObj.delivery;
  // Fallback hardcoded
  if(key.startsWith('EU_')||['UK','SWITZERLAND','NORWAY','ITALIA'].includes(key)) return 'Delivery within 7 working days';
  if(speed==='EXPRESS'||key.includes('EXPRESS')) return 'Delivery within 9 working days';
  return 'Delivery within 20 working days';
}
// dLabel/shipping.json always return English ("Delivery within N working days") — reformat for display only
function deliveryLabel(label,lang){
  if(!label||lang==='en') return label;
  const m=label.match(/(\d+)/);
  return m?I18N[lang].cart.deliveryDays(m[1]):label;
}
function rateKey(code,speed,wine){
  if(code==='US'){
    if(wine) return speed==='EXPRESS'?'USA_WINE_EXPRESS':'USA_WINE_STANDARD';
    return speed==='EXPRESS'?'USA_EXTRA_EXPRESS':'USA_EXTRA_STANDARD';
  }
  if(code==='CA') return speed==='EXPRESS'?'CANADA_EXPRESS':'CANADA_STANDARD';
  return ZONE_MAP[code]||null;
}
function validDomain(d){ return /^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/.test(d); }

// Restituisce la label dello scaglione applicato — es. "(4–6 pieces)"
function tierLabel(qty,lang){
  const pieces = I18N[lang||'en'].cart.pieces;
  if(qty<=0) return '';
  const steps=[[1,3],[4,6],[7,12],[13,18],[19,24],[25,30],[31,36],[37,42],[43,48],[49,54],[55,60]];
  for(const [lo,hi] of steps) if(qty>=lo&&qty<=hi) return pieces(lo,hi);
  return pieces(55,60);
}
// Quanti items interi si possono aggiungere prima che lo scaglione spedizione cambi
function shippingTierHint(shipQty){
  if(shipQty<=0) return 0;
  const currentTier=QTY_TIERS.find(t=>shipQty<=t);
  if(!currentTier) return 0;
  return Math.floor(currentTier-shipQty);
}

    const isPWA=window.matchMedia('(display-mode: standalone)').matches||!!window.navigator.standalone;
    return !isPWA;
  });

  useEffect(()=>{
    // Splash: show for at least 7 seconds in PWA standalone mode
    const splashTimer=setTimeout(()=>setSplashReady(true),7000);

    // Payment success: clean URL only (email sent automatically via Stripe webhook)
    (function(){
      const p=new URLSearchParams(window.location.search);
      if(p.get('payment')==='success'||p.get('payment')==='cancel'){
        sessionStorage.removeItem('ciliegio_pending_order');
        window.history.replaceState({},'',window.location.pathname);
      }
    })();

    Promise.all([
      fetch(window.CFG.products).then(r=>{if(!r.ok)throw 0;return r.json();}),
      fetch(window.CFG.shipping).then(r=>{if(!r.ok)throw 0;return r.json();}),
      fetch(window.CFG.privacy).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(window.CFG.modules).then(r=>r.ok?r.json():null).catch(()=>null),
    ]).then(([p,s,prv,mod])=>{setProds(p.sort((a,b)=>(a.sort||999)-(b.sort||999)));setShip(s);if(prv)setPrivacyJson(prv);if(mod)setModules(mod);setLoad(false);})
      .catch(()=>{setErr(L.error.msg);setLoad(false);});
    return ()=>clearTimeout(splashTimer);
  },[]);

  const reset=()=>{ setStep(1);setCart([]);setSpeed('STANDARD');setForm({...BLANK});setNat('');setGiftChoice(null);setShowGiftPopup(false);setShowPrivacy(false);setShowCAWarn(false); };

  const qty     = cart.reduce((s,i)=>s+i.qty,0);
  const shipQty = cart.reduce((s,i)=>s+effectiveUnits(i),0);
  const prod  = cart.reduce((s,i)=>s+i.price*i.qty,0);
  // Vino O Sparkling → listino USA_WINE (con dazi)
  const wine  = cart.some(i=>i.category==='WINE'||i.category==='SPARKLING');
  const aKey  = rateKey(form.natCode,speed,wine);
  const aRate = ship&&aKey?ship[aKey]:null;
  const sc    = shipQty>0&&aRate?shipRate(aRate,shipQty):0;
  const giftActive  = giftChoice===true;
  const discount      = (!giftActive && qty>=12) ? prod*0.05 : 0;
  const discounted    = prod - discount;
  const italyFree     = form.natCode==='IT' && discounted>100;
  const effectiveSc   = italyFree ? 0 : sc;
  const duty          = form.natCode==='US'?discounted*0.1:0;
  const total         = discounted + effectiveSc + duty;
  const dl    = deliveryLabel(dLabel(aKey,speed,aRate),lang);
  const spSel = ['US','CA'].includes(form.natCode);
  const totals= {qty,shipQty,prod,discount,ship:effectiveSc,duty,final:total};

  const getDutyReminder=(code,hasWine)=>{
    const msg1 = L.duty.genericUnknown;
    if(code==='US' && !hasWine) return msg1;
    if(code==='CA') return msg1;
    if(code==='GB') return L.duty.gb;
    if(code==='CH') return L.duty.ch;
    if(code==='NO') return L.duty.no;
    // All other non-EU extra countries
    const EU_AND_ITALY = ['IT','DE','BE','NL','LU','FR','DK','AT','ES','SE','PT','IE','SI','FI','HR','GR','CY','MT','PL','CZ','SK','HU','BG','EE','LV','LT','RO'];
    if(!EU_AND_ITALY.includes(code) && code!=='US') return msg1;
    return null;
  };

  const handleSendOrder=()=>{
    const reminder = getDutyReminder(form.natCode, wine);
    if(reminder){ setDutyReminder(reminder); return; }
    sendWA();
  };

  const buildMsg=(nl,bold)=>{
    const em=form.emailUser+'@'+form.emailDomain;

    m+='Nationality: '+form.nationality+nl+'Email: '+em+nl+'Phone: '+form.mobile+nl;
    const stateAbbr=form.province&&form.state&&form.province!==form.state?' ('+form.province+')':'';
    m+='Address: '+form.address+', '+form.zip+' '+form.city+', '+form.state+stateAbbr+nl;

  const sendVenditaEmail=()=>{

    if(discount>0) totalLines+='|Discount (5%): -€'+discount.toFixed(2);

    totalLines+='|Shipping ('+(aRate?aRate.label:'N/A')+('): €'+effectiveSc.toFixed(2));
    totalLines+='|FINAL TOTAL: €'+total.toFixed(2);

        type:'checkout.session.completed',

  const goToStripe=async(method)=>{
    const NL=String.fromCharCode(10);
    const amount=method==='paypal'?Math.round(total*1.05*100)/100:Math.round(total*100)/100;
    const waMsg=buildMsg('%0A',true);
    sessionStorage.setItem('ciliegio_pending_order',JSON.stringify({wa:waMsg,method:method}));
    if(typeof gtag!=='undefined') gtag('event','checkout_started',{event_category:'payment',event_label:method,value:Math.round(amount)});
    try{
      const res=await fetch('https://ciliegio-shop.netlify.app/.netlify/functions/create-checkout',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          total:amount,
          currency:'eur',
          customerName:form.name+' '+form.surname,
          customerEmail:form.emailUser+'@'+form.emailDomain,
          customerPhone:form.mobile,
          customerAddress:form.address+', '+form.zip+' '+form.city+', '+form.state+(form.province&&form.province!==form.state?' ('+form.province+')':''),
          orderProducts:cart.map(function(i){var n=i.name.length>38?i.name.substring(0,38)+'..':i.name;return i.qty+'x '+n+' ('+(i.price===0?'FREE GIFT':'€'+i.price.toFixed(2))+')'}).join('|').substring(0,490),
          orderTotals:('Products Total: €'+prod.toFixed(2)+(discount>0?'|Discount (5%): -€'+discount.toFixed(2):'')+(duty>0?'|Import Duties (10%): €'+duty.toFixed(2):'')+('|Shipping ('+(aRate?aRate.label:'N/A')+'): €'+effectiveSc.toFixed(2))+'|FINAL TOTAL: €'+total.toFixed(2)).substring(0,490),
          method:method,
        })
      });
      const data=await res.json();
      if(data.url) window.location.href=data.url;
      else alert('Payment error. Please try again.');
    }catch(e){ alert('Connection error. Please try again.'); }
  };
  const sendSMS=()=>{
    if(typeof gtag!=='undefined') gtag('event','order_sent',{event_category:'order',event_label:'SMS',value:Math.round(total),currency:'EUR',items_count:qty,nationality:form.natCode});
    const NL=String.fromCharCode(10);
    const text=encodeURIComponent(buildMsg(NL,false));
    const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
    const sep=isIOS?'&':'?';
    window.open('sms:'+window.CFG.whatsapp+sep+'body='+text);
  };

  if(loading||!splashReady) return(
    <div className="min-h-screen bg-black flex flex-col items-center justify-center" style={{padding:'40px 32px',textAlign:'center'}}>
      <img src="https://raw.githubusercontent.com/shopilciliegio-ship-it/CiliegioShop/refs/heads/main/ciliegio_trasparente.png" alt="Il Ciliegio" style={{height:'100px',objectFit:'contain',marginBottom:'36px'}}/>
      <p style={{color:'#D4AF37',fontSize:'16px',fontWeight:'bold',letterSpacing:'0.04em',lineHeight:'1.8',marginBottom:'22px'}}>{L.splash.tagline}</p>
      <p style={{color:'#fff',fontSize:'14px',lineHeight:'1.85',marginBottom:'18px'}}>{L.splash.offer1a}<br/>{L.splash.offer1b}</p>
      <p style={{color:'#666',fontSize:'13px',marginBottom:'18px'}}>{L.splash.or}</p>
      <p style={{color:'#fff',fontSize:'14px',lineHeight:'1.85'}}>{L.splash.offer2a} <span style={{color:'#D4AF37',fontWeight:'bold'}}>{L.splash.limitedEdition}</span><br/>{L.splash.offer2b}</p>
      {loading&&<p style={{color:'#D4AF37',fontSize:'11px',marginTop:'48px',opacity:0.45,textTransform:'uppercase',letterSpacing:'0.12em'}}>{L.splash.loading}</p>}
    </div>);
  if(err) return(
    <div className="min-h-screen bg-black flex items-center justify-center p-8">
      <div className="text-center"><div className="text-4xl mb-4">⚠️</div>
      <p className="gold-text text-lg mb-2">{L.error.title}</p>
      <p className="text-gray-400 text-sm">{err}</p></div>
    </div>);

  return(
    <div className="min-h-screen bg-black text-white" style={{padding: step===3?'8px':'16px 16px 32px'}}>
      <div className="w-full" style={{maxWidth: step===3?'100%':'768px', margin:'0 auto'}}>

        {/* Header */}
        <div className="relative text-center mb-4 flex flex-col items-center" style={{paddingTop:"env(safe-area-inset-top,0px)"}}>
          <span style={{position:"absolute",right:0,top:0,display:"flex",alignItems:"center",gap:"8px"}}>
            <span style={{fontSize:"10px"}}>
              {isVendita
                ?<span className="gold-text font-bold" style={{cursor:"pointer"}} onClick={()=>{localStorage.removeItem('ciliegio_vendita');setIsVendita(false);}}>🏪 VENDITA</span>
                :<span style={{color:"#fff",opacity:0.4,cursor:"pointer"}} onClick={()=>setShowLogin(true)}>v.91</span>}
            </span>
            <LanguageSelector lang={lang} setLang={setLang}/>
          </span>
          <button onClick={reset}
            className="absolute left-0 top-0 px-3 py-2 rounded border gold-border gold-text text-xs uppercase tracking-widest hover:bg-[#D4AF37] hover:text-black transition font-bold">
            {L.header.home}
          </button>
          <img id="logo-img" src="https://raw.githubusercontent.com/shopilciliegio-ship-it/CiliegioShop/refs/heads/main/ciliegio_trasparente.png" alt="Il Ciliegio" className="h-16 object-contain"
            onLoad={()=>{const t=document.getElementById('logo-txt');if(t)t.style.display='none';}}
            onError={()=>{const i=document.getElementById('logo-img');if(i)i.style.display='none';const t=document.getElementById('logo-txt');if(t)t.style.display='block';}}/>
          <h1 id="logo-txt" className="text-2xl font-bold gold-text tracking-widest" style={{display:'none'}}>IL CILIEGIO</h1>
        </div>

        {showPrivacy && <PrivacyPopup text={privacyJson?(privacyJson[lang]||privacyJson.en):''} lang={lang} onClose={()=>setShowPrivacy(false)}/>}
        {showLogin && <LoginPopup onClose={()=>setShowLogin(false)}
          onLogin={()=>{setIsVendita(true);setShowLogin(false);}}
          onOpenCalc={()=>{setShowWineClubCalc(true);setShowLogin(false);}}/>}
        {showWineClubCalc && <WineClubCalculator onClose={()=>setShowWineClubCalc(false)}/>}
        {showCAWarn && (
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}>
            <div className="bg-dark border gold-border rounded-lg shadow-xl" style={{maxWidth:'360px',width:'100%',padding:'28px',textAlign:'center'}}>
              <div style={{fontSize:'3rem',marginBottom:'12px'}}>🚫</div>
              <h2 className="gold-text font-bold uppercase mb-4" style={{fontSize:'15px',letterSpacing:'0.05em'}}>{L.caWarn.title}</h2>
              <p className="text-gray-300 mb-6" style={{fontSize:'13px',lineHeight:'1.7'}}>
                {L.caWarn.msg}
              </p>
              <button onClick={()=>{setShowCAWarn(false);setTimeout(()=>{
              if(typeof gtag!=='undefined') gtag('event','step_catalog',{event_category:'funnel'});
              setStep(3);
            },50);}}
                className="w-full p-3 rounded gold-bg font-bold uppercase hover:bg-yellow-600 transition"
                style={{fontSize:'14px',letterSpacing:'0.05em'}}>
                {L.caWarn.btn}
              </button>
            </div>
          </div>
        )}
        {dutyReminder && <DutyReminderPopup msg={dutyReminder} lang={lang} onConfirm={()=>{setDutyReminder(null);sendWA();}} onClose={()=>setDutyReminder(null)}/>}
        {step===1 && <FormStep form={form} setForm={setForm} natTxt={natTxt} setNat={setNat} lang={lang} onNext={()=>{
              if(typeof gtag!=='undefined') gtag('event','step_registration',{event_category:'funnel',event_label:'Completed registration',nationality:form.natCode});
              setStep(2);
            }}/>}
        {step===2 && <SummaryStep form={form} onEdit={()=>setStep(1)} onPrivacy={()=>setShowPrivacy(true)} lang={lang}
          cookieConsent={cookieConsent}
          onCookieAccept={()=>{localStorage.setItem('ciliegio_cookie_consent','accepted');if(window.enableAnalytics)window.enableAnalytics();setCookieConsent('accepted');}}
          onCookieReject={()=>{localStorage.setItem('ciliegio_cookie_consent','rejected');setCookieConsent('rejected');}}
          onConfirm={()=>{
            const CA_NO_ALCOHOL=['NEW BRUNSWICK','NEWFOUNDLAND','NORTHWEST TERRITORIES',
              'NOVA SCOTIA','NUNAVUT','PRINCE EDWARD ISLAND','SASKATCHEWAN','YUKON'];
            const CA_NO_ALCOHOL_ABBR=['NB','NL','NT','NS','NU','PE','SK','YT'];
            const caStr=(form.province+' '+form.state).toUpperCase();
            const caAbbr=form.province.trim().toUpperCase();
            const blocked=form.natCode==='CA'&&(
              CA_NO_ALCOHOL.some(p=>caStr.includes(p))||
              CA_NO_ALCOHOL_ABBR.includes(caAbbr)
            );
            if(blocked) setShowCAWarn(true);
            else{
              if(typeof gtag!=='undefined') gtag('event','step_catalog',{event_category:'funnel'});
              setStep(3);
            }
          }}/>}
        {step===3 && <CatalogStep products={prods} cart={cart} setCart={setCart} lang={lang}
          speed={speed} setSpeed={setSpeed} spSel={spSel}
          aRate={aRate} aKey={aKey} hasDuty={duty>0} dl={dl}
          totals={totals} onSend={handleSendOrder} onDirectSend={sendWA} onEmail={sendEmail} onSMS={sendSMS} onStripe={goToStripe} getMailtoUrl={getMailtoUrl} isVendita={isVendita} natCode={form.natCode} province={form.province} state={form.state}
          resetCart={()=>{setCart([]);setGiftChoice(null);setShowGiftPopup(false);}}
          giftChoice={giftChoice} setGiftChoice={setGiftChoice}
          showGiftPopup={showGiftPopup} setShowGiftPopup={setShowGiftPopup}/>}
      </div>
    </div>
  );
}

/* ── FormStep ──────────────────────────────────────────────── */
function FormStep({form,setForm,natTxt,setNat,onNext,lang}){
  const L = I18N[lang];
  const [showNat,setShowNat] = useState(false);
  const [domErr,setDomErr]   = useState(false);
  const nations = COUNTRIES.filter(c=>c.name.startsWith(natTxt.toUpperCase()));

  const pickCountry=(c)=>{
    setForm({...BLANK,nationality:c.name,natCode:c.code,mobile:c.prefix+' '});
    setNat(c.name); setShowNat(false);
  };

  const onZipBlur=async(e)=>{
    const z=e.target.value.trim();
    if(!z||!form.natCode) return;
    try{
      const url='https://nominatim.openstreetmap.org/search?postalcode='+encodeURIComponent(z)+'&countrycodes='+form.natCode.toLowerCase()+'&format=json&addressdetails=1&limit=1';
      const r=await fetch(url,{headers:{'Accept-Language':'en'}});
      if(!r.ok) return;
      const data=await r.json();
      if(!data.length) return;
      const a=data[0].address;
      const city=(a.municipality||a.city||a.town||a.village||a.hamlet||'').toUpperCase();
      const province=(a.county||a.state_district||a.region||'').toUpperCase();
      const region=(a.state||'').toUpperCase();
      setForm(f=>({...f,city,province,state:region}));
    }catch(_){}
  };

  const ok=form.nationality&&form.name&&form.surname&&form.address&&
    form.zip&&form.city&&form.province&&form.state&&
    form.mobile&&form.emailUser&&form.emailDomain&&validDomain(form.emailDomain);

  return(
    <div className="bg-dark p-6 rounded-lg border gold-border shadow-lg shadow-yellow-900/20">
      <div className="flex flex-col sm:flex-row sm:items-baseline sm:justify-between border-b border-[#D4AF37] pb-2 mb-5 gap-1">
        <h2 className="text-xl gold-text">{L.form.title}</h2>
        <span className="text-xs gold-text opacity-70 italic">{L.form.required}</span>
      </div>
      <div className="space-y-4">

        {/* Nationality */}
        <div className="relative">
          <label className="block text-xs text-gray-400 mb-1">{L.form.nationality}</label>
          <input className="w-full p-3 rounded uppercase" type="text"
            placeholder={L.form.nationalityPh} value={natTxt}
            onFocus={()=>setShowNat(true)}
            onChange={e=>{
              const v=e.target.value.toUpperCase(); setNat(v);
              if(form.nationality&&v!==form.nationality) setForm(f=>({...f,nationality:'',natCode:''}));
            }}/>
          {showNat&&natTxt&&!form.nationality&&(
            <div className="absolute z-30 w-full mt-1 bg-[#1a1a1a] border gold-border rounded max-h-44 overflow-y-auto">
              {nations.length>0?nations.map(c=>(
                <div key={c.code} className="p-3 hover:bg-[#333] cursor-pointer flex items-center gap-2 uppercase text-sm"
                  onClick={()=>pickCountry(c)}>{c.flag} {c.name} ({c.code})</div>
              )):<div className="p-3 text-gray-500 text-sm">{L.form.noCountry}</div>}
            </div>)}
        </div>

        {/* ZIP — auto-fills city/province/state on blur */}
        <div>
          <label className="block text-xs text-gray-400 mb-1">{L.form.zip}
            <span className="ml-2 text-gray-600 italic text-xs">{L.form.zipHint}</span>
          </label>
          <input className="w-full p-3 rounded uppercase" type="text"
            placeholder={form.natCode?L.form.zipPh:L.form.zipPhDisabled}
            value={form.zip}
            onChange={e=>setForm(f=>({...f,zip:e.target.value.toUpperCase()}))}
            onBlur={onZipBlur}/>
        </div>

        {/* Name / Surname */}
        <div className="grid grid-cols-2 gap-3">
          <div><label className="block text-xs text-gray-400 mb-1">{L.form.firstName}</label>
            <input className="w-full p-3 rounded uppercase" type="text" value={form.name}
              onChange={e=>setForm(f=>({...f,name:e.target.value.toUpperCase()}))}/>
          </div>
          <div><label className="block text-xs text-gray-400 mb-1">{L.form.lastName}</label>
            <input className="w-full p-3 rounded uppercase" type="text" value={form.surname}
              onChange={e=>setForm(f=>({...f,surname:e.target.value.toUpperCase()}))}/>
          </div>
        </div>

        {/* Address */}
        <div><label className="block text-xs text-gray-400 mb-1">{L.form.address}</label>
          <input className="w-full p-3 rounded uppercase" type="text" placeholder={L.form.addressPh}
            value={form.address} onChange={e=>setForm(f=>({...f,address:e.target.value.toUpperCase()}))}/>
        </div>

        {/* City */}
        <div><label className="block text-xs text-gray-400 mb-1">{L.form.city}</label>
          <input className="w-full p-3 rounded uppercase" type="text"
            value={form.city} onChange={e=>setForm(f=>({...f,city:e.target.value.toUpperCase()}))}/>
        </div>

        {/* Province / State */}
        <div className="grid grid-cols-2 gap-3">
          <div><label className="block text-xs text-gray-400 mb-1">{L.form.province}</label>
            <input className="w-full p-3 rounded uppercase" type="text" value={form.province}
              onChange={e=>setForm(f=>({...f,province:e.target.value.toUpperCase()}))}/>
          </div>
          <div><label className="block text-xs text-gray-400 mb-1">{L.form.state}</label>
            <input className="w-full p-3 rounded uppercase" type="text" value={form.state}
              onChange={e=>setForm(f=>({...f,state:e.target.value.toUpperCase()}))}/>
          </div>
        </div>

        {/* Mobile */}
        <div><label className="block text-xs text-gray-400 mb-1">{L.form.mobile}</label>
          <input className="w-full p-3 rounded" type="text" placeholder={L.form.mobilePh}
            value={form.mobile} onChange={e=>setForm(f=>({...f,mobile:e.target.value.replace(/[^\d+\s]/g,'')}))}/>
        </div>

        {/* Email */}
        <div><label className="block text-xs text-gray-400 mb-1">{L.form.email}</label>
          <div className="flex w-full items-center gap-2">
            <input type="text" className="min-w-0 flex-1 p-3 rounded text-right lowercase"
              placeholder={L.form.emailUserPh} value={form.emailUser}
              onChange={e=>setForm(f=>({...f,emailUser:e.target.value.replace(/\s/g,'').toLowerCase()}))}/>
            <span className="gold-text font-bold text-xl shrink-0">@</span>
            <input type="text" className={`min-w-0 flex-1 p-3 rounded lowercase${domErr?' err-field':''}`}
              placeholder={L.form.emailDomainPh} value={form.emailDomain}
              onChange={e=>{setDomErr(false);setForm(f=>({...f,emailDomain:e.target.value.replace(/\s/g,'').toLowerCase()}));}}
              onBlur={e=>{const v=e.target.value.trim();setDomErr(v!==''&&!validDomain(v));}}/>
          </div>
          {domErr&&<p className="text-xs text-red-400 mt-1">{L.form.emailFormatErr}</p>}
        </div>
      </div>

      <button onClick={onNext} disabled={!ok}
        className={`w-full mt-8 p-4 rounded font-bold uppercase tracking-widest transition-all
          ${ok?'gold-bg hover:bg-yellow-600':'bg-gray-800 text-gray-500 cursor-not-allowed'}`}>
        {L.form.continue}
      </button>
    </div>
  );
}

/* ── SummaryStep ───────────────────────────────────────────── */
function SummaryStep({form,onEdit,onConfirm,onPrivacy,cookieConsent,onCookieAccept,onCookieReject,lang}){
  const L = I18N[lang];
  const cookieDecided = !!cookieConsent;
  return(
    <div className="bg-dark p-6 rounded-lg border gold-border shadow-lg shadow-yellow-900/20">
      <div className="relative flex items-center justify-center border-b border-[#D4AF37] pb-2 mb-5">
        <h2 className="text-xl gold-text">{L.summary.title}</h2>
        <button onClick={onPrivacy} className="absolute right-0 px-3 py-1 rounded border gold-border gold-text text-xs uppercase tracking-widest hover:bg-[#D4AF37] hover:text-black transition font-bold">{L.summary.privacy}</button>
      </div>
      <div className="space-y-3 text-sm">
        {[[L.summary.customer,`${form.name} ${form.surname}`],
          [L.summary.nationality,form.nationality],
          [L.summary.email,`${form.emailUser}@${form.emailDomain}`],
          [L.summary.phone,form.mobile],
          [L.summary.address,<>{form.address}<br/>{form.zip} {form.city}<br/>{form.state}{form.province&&form.province!==form.state?' ('+form.province+')':''}</>],
        ].map(([l,v],i)=>(
          <div key={i} className="flex justify-between border-b border-gray-800 pb-2">
            <span className="text-gray-400">{l}:</span>
            <span className="font-bold text-right">{v}</span>
          </div>))}
      </div>
      <div className="flex gap-4 mt-8">
        <button onClick={onEdit} className="flex-1 p-4 rounded border gold-border gold-text hover:bg-[#D4AF37] hover:text-black uppercase font-bold text-xs tracking-widest">{L.summary.edit}</button>
        <button onClick={onConfirm} disabled={!cookieDecided}
          className={`flex-1 p-4 rounded uppercase font-bold text-xs tracking-widest transition-all
            ${cookieDecided?'gold-bg hover:bg-yellow-600':'bg-gray-800 text-gray-500 cursor-not-allowed'}`}>
          {L.summary.confirm}
        </button>
      </div>
      <p className="text-gray-500 text-center mt-4" style={{fontSize:'11px',lineHeight:'1.5'}}>
        {L.summary.disclaimer}
      </p>

      {!cookieDecided && <CookieConsentBlock onAccept={onCookieAccept} onReject={onCookieReject} onPrivacy={onPrivacy} lang={lang}/>}
    </div>
  );
}

/* ── ProductCard ───────────────────────────────────────────── */
function ProductCard({p,onAdd,blocked,lang}){
  const L = I18N[lang];
  const [imgErr,setImgErr]=useState(false);
  const src=p.img?window.CFG.imgBase+p.img:null;
  const unavail = p.available===false;
  const disabled = unavail || blocked;
  return(
    <div className={`bg-dark rounded border text-center flex flex-col gap-1 transition-all overflow-hidden${disabled?' border-gray-800 opacity-50':' border-gray-800 hover:border-[#D4AF37]'}`} style={{padding:'6px'}}>
      {src&&!imgErr
        ?<img src={src} alt={p.name} className="prod-img" onError={()=>setImgErr(true)} style={disabled?{filter:'grayscale(100%)'}:{}}/>
        :<div className="prod-img-fallback">🍷</div>}
      <p className="font-bold leading-tight text-gray-200" style={{fontSize:'10px',lineHeight:'1.2'}}>{p.name}</p>
      <p className="gold-text font-bold" style={{fontSize:'11px'}}>€{p.price.toFixed(2)}</p>
      {unavail
        ?<div className="w-full rounded uppercase text-gray-500 border border-gray-700" style={{fontSize:'10px',padding:'3px 0'}}>{L.product.outOfStock}</div>
        :blocked
          ?<div className="w-full rounded uppercase text-gray-500 border border-gray-700" style={{fontSize:'10px',padding:'3px 0'}}>{L.product.notAvailable}</div>
          :<button onClick={()=>onAdd(p)}
            className="w-full border gold-border gold-text rounded uppercase hover:bg-[#D4AF37] hover:text-black transition"
            style={{fontSize:'10px',padding:'3px 0'}}>
            {L.product.add}
          </button>}
    </div>
  );
}

/* ── CartPanel ─────────────────────────────────────────────── */
function CartPanel({cart,totals,aRate,hasDuty,dl,addItem,removeItem,onSend,onDirectSend,onEmail,onSMS,onStripe,onPlaceOrder,speed,setSpeed,spSel,noRate,natCode,lang}){
  const L = I18N[lang];
  const italyFreeShip = natCode==='IT' && (totals.prod - totals.discount) > 100;
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',gap:'4px',overflow:'hidden'}}>

      {/* Avviso paese non coperto */}
      {noRate&&(
        <div className="bg-yellow-950 border border-yellow-700 rounded p-2 shrink-0">
          <p className="text-yellow-300 font-bold" style={{fontSize:'10px'}}>{L.cart.noRateWarnTitle}</p>
          <p className="text-yellow-500 mt-1" style={{fontSize:'9px'}}>{L.cart.noRateWarnMsg}</p>
        </div>)}

      {/* Speed selector — tutto su un rigo compatto */}
      {spSel&&(
        <div className="border border-gray-700 rounded px-2 py-1 shrink-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-gray-500 uppercase shrink-0" style={{fontSize:'9px',letterSpacing:'0.05em'}}>{L.cart.ship}</span>
            {['STANDARD','EXPRESS'].map(o=>(
              <button key={o} onClick={()=>setSpeed(o)}
                className={`px-2 rounded border font-bold uppercase transition shrink-0
                  ${speed===o?'gold-bg border-[#D4AF37]':'border-gray-700 text-gray-400 hover:border-[#D4AF37]'}`}
                style={{fontSize:'10px',padding:'2px 6px'}}>
                {o}
              </button>))}
            {dl&&<span className="gold-text font-bold" style={{fontSize:'10px'}}>{dl}</span>}
          </div>
        </div>)}

      {/* No speed — solo delivery label in oro */}
      {!spSel&&dl&&(
        <div className="shrink-0">
          <span className="gold-text font-bold" style={{fontSize:'10px'}}>⏱ {dl}</span>
        </div>)}

      <div className="cart-inner"><div className="space-y-1">
        {cart.length===0
          ?<p className="text-gray-500 italic text-center py-4" style={{fontSize:'12px'}}>{L.cart.empty}</p>
          :cart.map(c=>(
            <div key={c.id} className="flex items-center bg-black rounded px-2 py-1 gap-2">
              <div className="flex-1 min-w-0">
                <p className="font-bold text-gray-200 truncate" style={{fontSize:'10px'}}>{c.name}</p>
                <p className="text-gray-400" style={{fontSize:'10px'}}>
                  €{c.price.toFixed(2)} ×{c.qty} = <span className="text-gray-300">€{(c.price*c.qty).toFixed(2)}</span>
                </p>
              </div>
              {c.id!=='5_gift'&&<div className="flex gap-1 shrink-0">
                <button onClick={()=>removeItem(c.id)} className="w-6 h-6 bg-gray-800 rounded hover:bg-red-700 font-bold text-sm">−</button>
                <button onClick={()=>addItem(c)} className="w-6 h-6 gold-bg rounded font-bold text-sm">+</button>
              </div>}
            </div>))}
      </div></div>

      {/* Totals — always visible, pinned above Send button */}
      <div className="cart-send">
      <div className="border-t border-gray-800 pt-2" style={{fontSize:'11px'}}>
        <div className="flex justify-between text-gray-400"><span>{L.cart.products(totals.qty)}</span><span>€{totals.prod.toFixed(2)}</span></div>
        {totals.discount>0&&<div className="flex justify-between" style={{color:'#4ade80'}}><span>{L.cart.discount}</span><span>-€{totals.discount.toFixed(2)}</span></div>}
        {hasDuty&&<div className="flex justify-between text-gray-400"><span>{L.cart.duties}</span><span>€{totals.duty.toFixed(2)}</span></div>}
        {italyFreeShip
          ?<div className="flex justify-between" style={{color:'#4ade80'}}><span>{L.cart.shipping}</span><span>{L.cart.freeShip}</span></div>
          :<div className="flex justify-between text-gray-400"><span>{L.cart.shipping}</span><span className="text-white"><span className="text-gray-300 mr-1" style={{fontSize:'10px'}}>{tierLabel(totals.shipQty,lang)}</span>€{totals.ship.toFixed(2)}</span></div>}
        {!italyFreeShip&&aRate&&(()=>{const h=shippingTierHint(totals.shipQty);return h>0?<p className="text-right" style={{color:'#60a5fa',fontSize:'10px',marginTop:'2px'}}>{L.cart.addMoreItems(h)}</p>:null;})()}
        {totals.qty>0&&!aRate&&<p className="text-yellow-600 text-right" style={{fontSize:'10px'}}>{L.cart.noRate}</p>}
        <div className="flex justify-between font-bold gold-text border-t border-gray-800 pt-1 mt-1" style={{fontSize:'13px'}}>
          <span>{L.cart.total}</span><span>€{totals.final.toFixed(2)}</span>
        </div>
      </div>
      <button onClick={onPlaceOrder} disabled={cart.length===0}
        className={`w-full rounded font-bold uppercase transition
          ${cart.length>0?'gold-bg hover:bg-yellow-600':'bg-gray-800 text-gray-500 cursor-not-allowed'}`}
        style={{fontSize:'12px',padding:'9px 0',letterSpacing:'0.05em'}}>
        {L.cart.placeOrder}
      </button></div>
    </div>
  );
}

/* ── CatalogStep ───────────────────────────────────────────── */
function CatalogStep({products,cart,setCart,speed,setSpeed,spSel,
  aRate,aKey,hasDuty,dl,totals,onSend,onDirectSend,onEmail,onSMS,onStripe,getMailtoUrl,isVendita,natCode,province,state,
  resetCart,giftChoice,setGiftChoice,showGiftPopup,setShowGiftPopup,lang}){
  const L = I18N[lang];

  const [tab,setTab]         = useState('ALL');
  const [cartErr,setCartErr] = useState('');

  const isUSCA = ['US','CA'].includes(natCode);
  const isCA   = natCode==='CA';
  // Check province AND state fields, full names AND abbreviations
  const caProvinceStr = ((province||'')+' '+(state||'')).toUpperCase();
  const caProvinceAbbr = province.trim().toUpperCase();
  const caBlock = isCA&&(province||form.state)&&(
    CA_NO_WINE.some(p=>caProvinceStr.includes(p)) ||
    CA_NO_WINE_ABBR.includes(caProvinceAbbr)
  );
  const caBlockedCats = caBlock ? ['WINE','SPARKLING','DISTILLATES'] : [];

  // Distillates visible only for Italy + EU countries
  const EU_AND_ITALY = ['IT', 'DE', 'BE', 'NL', 'LU', 'FR', 'DK', 'AT', 'ES', 'SE', 'PT', 'IE', 'SI', 'FI', 'HR', 'GR', 'CY', 'MT', 'PL', 'CZ', 'SK', 'HU', 'BG', 'EE', 'LV', 'LT', 'RO'];
  const canSeeDistillates = EU_AND_ITALY.includes(natCode);

  const avail   = (isUSCA
    ? products.filter(p=>p.category!=='DISTILLATES'&&!US_CA_BLOCK.includes(p.id))
    : !canSeeDistillates
      ? products.filter(p=>p.category!=='DISTILLATES')
      : products
  ).filter(p=>p.id!=='5_gift');
  const visCats = (!canSeeDistillates)?CATEGORIES.filter(c=>c!=='DISTILLATES'):CATEGORIES;
  const tabs    = ['ALL',...visCats];
  const filtered= tab==='ALL'?avail:avail.filter(p=>p.category===tab);
  const dCats   = tab==='ALL'?visCats.filter(c=>avail.some(p=>p.category===c)):[tab];

  const addItem=(prod)=>{
    setCartErr('');
    // Max 36 articoli totali
    const currentQty=cart.reduce((s,i)=>s+i.qty,0);
    const currentShipQty=cart.reduce((s,i)=>s+effectiveUnits(i),0);
    const rateMaxItems = aRate && aRate.max_items ? aRate.max_items : null;
    const maxItems=(()=>{
      if(natCode==='IT') return 18;
      if(!aRate||!aRate.rates) return 60;
      const keys=Object.keys(aRate.rates).map(Number).filter(n=>!isNaN(n));
      return keys.length>0?Math.max(...keys):60;
    })();
    if(currentShipQty>=maxItems){
      setCartErr(L.catalog.maxItems(maxItems));
      return;
    }
    if(isCA){
      // WINE e SPARKLING sono "alcolici": possono stare assieme ma non con altre categorie
      const isAlc  = c => c==='WINE'||c==='SPARKLING';
      const iA     = isAlc(prod.category);
      const hasAlc = cart.some(i=>isAlc(i.category));
      const hasOth = cart.some(i=>!isAlc(i.category));
      if(iA&&hasOth){
        setCartErr(L.catalog.caMix);
        return;
      }
      if(!iA&&hasAlc){
        setCartErr(L.catalog.caMix);
        return;
      }
      if(iA&&caBlock){
        setCartErr(L.catalog.caBlocked(province));
        return;
      }
    }
    setCart(prev=>{
      const ex=prev.find(p=>p.id===prod.id);
      if(ex) return prev.map(p=>p.id===prod.id?{...p,qty:p.qty+1}:p);
      return [...prev,{...prod,qty:1}];
    });
    // After adding, check new qty
    const newQty = currentQty + 1;
    const currentNonGiftQtyForPopup = cart.reduce((s,i)=>i.id==='5_gift'?s:s+i.qty,0) + (prod.id==='5_gift'?0:1);
    if(giftChoice===null && currentNonGiftQtyForPopup===11) {
      // Don't offer gift to blocked CA provinces (no alcohol shipping)
      if(caBlock){ setGiftChoice(false); }
      else { setShowGiftPopup(true); }
    } else if(giftChoice===true) {
      // Count only NON-gift items currently in cart
      const currentNonGiftQty = cart.reduce((s,i)=>i.id==='5_gift'?s:s+i.qty, 0);
      // Add 1 if the product being added is not a gift
      const nonGiftQty = currentNonGiftQty + (prod.id==='5_gift'?0:1);
      const expectedGifts = Math.floor(nonGiftQty / 11);
      const currentGifts = cart.filter(i=>i.id==='5_gift').reduce((s,i)=>s+i.qty,0);
      if(expectedGifts > currentGifts){
        const giftProd = products.find(p=>p.id==='5_gift');
        if(giftProd) setCart(prev=>{
          const ex=prev.find(p=>p.id==='5_gift');
          if(ex) return prev.map(p=>p.id==='5_gift'?{...p,qty:p.qty+1}:p);
          return [...prev,{...giftProd,qty:1}];
        });
      }
    }
  };
  const removeItem=(id)=>{
    setCartErr('');
    setCart(prev=>{
      const updated = prev.map(p=>p.id===id?{...p,qty:p.qty-1}:p).filter(p=>p.qty>0);
      if(giftChoice===true){
        const nonGiftQty = updated.reduce((s,i)=>i.id==='5_gift'?s:s+i.qty,0);
        const expectedGifts = Math.floor(nonGiftQty/11);
        const currentGifts = updated.filter(i=>i.id==='5_gift').reduce((s,i)=>s+i.qty,0);
        if(currentGifts > expectedGifts){
          let toRemove = currentGifts - expectedGifts;
          return updated.map(p=>{
            if(p.id==='5_gift' && toRemove>0){ toRemove--; return p.qty-1>0?{...p,qty:p.qty-1}:null; }
            return p;
          }).filter(Boolean);
        }
      }
      return updated;
    });
  };

  // ── Duty warning popup ──
  const getDutyWarning=(()=>{
    const hasWine = cart.some(i=>i.category==='WINE'||i.category==='SPARKLING');
    const euCodes = ['IT','DE','BE','NL','LU','FR','DK','AT','ES','SE','PT',
                     'IE','SI','FI','HR','GR','CY','MT','PL','CZ','SK','HU',
                     'BG','EE','LV','LT','RO'];
    if(euCodes.includes(natCode)) return null; // no warning for EU+IT
    if(natCode==='US' && hasWine) return null; // US wine: duties already shown in cart
    if(natCode==='US') return L.duty.genericUnknown;
    if(natCode==='CA') return L.duty.genericUnknown;
    if(natCode==='GB') return L.duty.gb;
    if(natCode==='CH') return L.duty.ch;
    if(natCode==='NO') return L.duty.no;
    return L.duty.genericUnknown;
  })();

  const [showDutyWarn,setShowDutyWarn] = useState(false);
  const [pendingAction,setPendingAction] = useState('wa');

  const handleSend=()=>{ if(getDutyWarning){setShowDutyWarn(true);setPendingAction('wa');}else{onSend();} };
  const handleEmail=()=>{ if(getDutyWarning){setShowDutyWarn(true);setPendingAction('email');}else{onEmail();} };

  const [showOrderPopup,setShowOrderPopup] = useState(false);
  const handlePlaceOrder=()=>{
    if(getDutyWarning){setShowDutyWarn(true);}
    else{setShowOrderPopup(true);}
  };
  const panelProps={cart,totals,aRate,hasDuty,dl,addItem,removeItem,onSend:handleSend,onDirectSend:onDirectSend,onEmail:handleEmail,onSMS:onSMS,onStripe:onStripe,onPlaceOrder:handlePlaceOrder,speed,setSpeed,spSel,noRate:totals.qty>0&&!aRate,natCode,lang};

  const handleGiftYes = () => {
    setGiftChoice(true);
    setShowGiftPopup(false);
    // Use the dedicated 5_gift product from products.json (already price=0)
    const giftProd = products.find(p=>p.id==='5_gift');
    if(giftProd) setCart(prev=>{
      const ex=prev.find(p=>p.id==='5_gift');
      if(ex) return prev.map(p=>p.id==='5_gift'?{...p,qty:p.qty+1}:p);
      return [...prev,{...giftProd,qty:1}];
    });
  };
  const handleGiftNo = () => {
    setGiftChoice(false);
    setShowGiftPopup(false);
  };

  const doResetCart=()=>{
    resetCart();
    setCartErr('');
  };

  return(
    <div className="catalog-page">
      {showGiftPopup && <GiftPopup products={products} onYes={handleGiftYes} onNo={handleGiftNo} lang={lang}/>}
      {showOrderPopup&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}>
          <div className="bg-dark border gold-border rounded-lg shadow-xl" style={{maxWidth:'380px',width:'100%',padding:'28px',textAlign:'center'}}>
            <div style={{fontSize:'2.5rem',marginBottom:'12px'}}>🍷</div>
            <h2 className="gold-text font-bold mb-3" style={{fontSize:'17px',letterSpacing:'0.04em'}}>{L.catalog.orderPopup.thanks}<br/>{L.catalog.orderPopup.brand}</h2>
            <p className="text-gray-300 mb-4" style={{fontSize:'12px',lineHeight:'1.8'}}>
              {L.catalog.orderPopup.completed}
            </p>
            <p className="gold-text mb-4" style={{fontSize:'11px',fontStyle:'italic'}}>{L.catalog.orderPopup.choosePayment}</p>
            {isVendita
              ? <button onClick={()=>{setShowOrderPopup(false);onDirectSend();}}
                  className="w-full p-3 rounded font-bold uppercase bg-green-600 hover:bg-green-500 text-white transition mb-2"
                  style={{fontSize:'13px'}}>{L.catalog.orderPopup.sendWA}</button>
              : <div style={{display:'flex',gap:'8px',marginBottom:'8px'}}>
                  <button onClick={()=>{setShowOrderPopup(false);onStripe('card');}}
                    className="flex-1 p-3 rounded font-bold uppercase transition"
                    style={{fontSize:'11px',background:'#635BFF',color:'#fff',border:'none'}}>
                    {L.catalog.orderPopup.payCard}
                  </button>
                  <button onClick={()=>{setShowOrderPopup(false);onStripe('paypal');}}
                    className="flex-1 p-3 rounded font-bold uppercase transition"
                    style={{fontSize:'11px',background:'#003087',color:'#fff',border:'none'}}>
                    {L.catalog.orderPopup.payPaypal}
                  </button>
                </div>
            }

            <button onClick={()=>setShowOrderPopup(false)}
              className="w-full p-2 rounded border border-gray-700 text-gray-500 hover:border-gray-400 hover:text-gray-300 transition uppercase"
              style={{fontSize:'11px'}}>{L.catalog.orderPopup.goBack}</button>
          </div>
        </div>
      )}
      {showDutyWarn && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}>
          <div className="bg-dark border gold-border rounded-lg shadow-xl" style={{maxWidth:'380px',width:'100%',padding:'28px',textAlign:'center'}}>
            <div style={{fontSize:'2.5rem',marginBottom:'12px'}}>⚠️</div>
            <h2 className="gold-text font-bold uppercase mb-4" style={{fontSize:'15px',letterSpacing:'0.05em'}}>{L.dutyPopup.title}</h2>
            <p className="text-gray-300 mb-6" style={{fontSize:'13px',lineHeight:'1.7'}}>{getDutyWarning}</p>
            <div style={{display:'flex',gap:'12px'}}>
              <button onClick={()=>setShowDutyWarn(false)}
                className="flex-1 p-3 rounded border gold-border gold-text font-bold uppercase hover:bg-[#D4AF37] hover:text-black transition"
                style={{fontSize:'12px'}}>{L.catalog.dutyWarn.goBack}</button>
              <button onClick={()=>{setShowDutyWarn(false);setShowOrderPopup(true);}}
                className="flex-1 p-3 rounded bg-green-600 hover:bg-green-500 text-white font-bold uppercase transition"
                style={{fontSize:'12px'}}>{L.catalog.dutyWarn.understand}</button>
            </div>
          </div>
        </div>
      )}
      {cartErr&&<div className="bg-red-950 border border-red-700 rounded p-2 text-xs text-red-300 shrink-0 mb-1">{cartErr}</div>}

      <div className="catalog-layout">

        {/* ── Catalog column ── */}
        <div className="catalog-col">
          {/* Category tabs */}
          <div className="flex gap-1 flex-wrap mb-2">
            {tabs.map(t=>(
              <button key={t} onClick={()=>setTab(t)}
                className={`px-2 py-1 rounded font-bold uppercase border transition
                  ${tab===t?'gold-bg border-[#D4AF37]':'border-gray-700 text-gray-400 hover:border-[#D4AF37]'}`}
                style={{fontSize:'10px'}}>
                {CAT_LABEL[lang][t]}
              </button>))}
          </div>

          {dCats.map(cat=>{
            const ps=filtered.filter(p=>p.category===cat);
            if(!ps.length) return null;
            return(
              <div key={cat} className="mb-4">
                <h2 className="font-bold gold-text border-b border-gray-800 pb-1 mb-2" style={{fontSize:'13px'}}>{CAT_LABEL[lang][cat]}</h2>

                {/* auto-fill: ~4 cols on mobile (80px min), ~3-4 cols on desktop (120px min) */}
                <div className="grid gap-2 prod-grid">
                  {ps.map(p=><ProductCard key={p.id} p={p} onAdd={addItem} blocked={caBlockedCats.includes(p.category)} lang={lang}/>)}
                </div>
              </div>);
          })}
        </div>

        {/* ── Cart column ── */}
        <div className="cart-col bg-[#111] rounded border gold-border" style={{padding:'8px'}}>
          <div className="flex justify-between items-center border-b border-gray-800 pb-1 mb-2">
            <h2 className="gold-text font-bold" style={{fontSize:'13px'}}>{L.catalog.cartTitle}</h2>
            {cart.length>0&&<button onClick={doResetCart}
              className="border border-gray-600 text-gray-400 hover:border-red-500 hover:text-red-400 rounded transition"
              style={{fontSize:'9px',padding:'2px 6px'}}>{L.catalog.reset}</button>}
          </div>
          <CartPanel {...panelProps}/>
        </div>
      </div>
    </div>
  );
}

function LoginPopup({onClose,onLogin,onOpenCalc}){
  const [u,setU]=useState('');
  const [p,setP]=useState('');
  const [authed,setAuthed]=useState(false);
  const handle=()=>{
    if(u.trim()==='Vendita'&&p==='Vendita02'){ setAuthed(true); }
    else { onClose(); }
  };
  if(authed){
    return(
      <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}>
        <div className="bg-dark border gold-border rounded-lg shadow-xl" style={{maxWidth:'300px',width:'100%',padding:'28px',textAlign:'center'}}>
          <h2 className="gold-text font-bold mb-4" style={{fontSize:'16px'}}>Area Staff</h2>
          <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
            <button onClick={()=>{localStorage.setItem('ciliegio_vendita','1');onLogin();}}
              className="p-3 rounded gold-bg font-bold" style={{fontSize:'12px'}}>🏪 Modo Vendita</button>
            <button onClick={onOpenCalc}
              className="p-3 rounded border gold-border gold-text font-bold" style={{fontSize:'12px'}}>🍷 Calcolatore Wine Club</button>
            <button onClick={onClose} className="p-2 rounded border border-gray-700 text-gray-500" style={{fontSize:'11px'}}>Annulla</button>
          </div>
        </div>
      </div>
    );
  }
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}>
      <div className="bg-dark border gold-border rounded-lg shadow-xl" style={{maxWidth:'300px',width:'100%',padding:'28px',textAlign:'center'}}>
        <h2 className="gold-text font-bold mb-4" style={{fontSize:'16px'}}>Staff Login</h2>
        <input type="text" placeholder="Username" value={u} onChange={e=>setU(e.target.value)}
          className="w-full p-3 rounded mb-3" style={{textAlign:'center'}}/>
        <input type="password" placeholder="Password" value={p} onChange={e=>setP(e.target.value)}
          className="w-full p-3 rounded mb-4" style={{textAlign:'center'}}
          onKeyDown={e=>e.key==='Enter'&&handle()}/>
        <div style={{display:'flex',gap:'10px'}}>
          <button onClick={onClose} className="flex-1 p-3 rounded border gold-border gold-text" style={{fontSize:'12px'}}>Cancel</button>
          <button onClick={handle} className="flex-1 p-3 rounded gold-bg font-bold" style={{fontSize:'12px'}}>Login</button>
        </div>
      </div>
    </div>
  );
}

/* ── WineClubCalculator (interno, solo staff) ─────────────────
   Modulo "wine club": calcolo costo approvvigionamento + trasporto
   interno + margine, per pianificare i box prima di attivare il
   modulo per i clienti (vedi modules.json -> wineClub). */
const WINECLUB_TIERS = {entry:{label:'Entry',bottles:3},core:{label:'Core',bottles:6},reserve:{label:'Reserve',bottles:12}};
function loadWineClubBoxes(){
  try{
    const raw = localStorage.getItem('ciliegio_wineclub_boxes');
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
function blankWineClubEntry(){ return {id:Date.now()+Math.random(),winery:'',wine:'',costPerBottle:0,qty:1}; }
function blankWineClubBox(){
  return {id:Date.now()+Math.random(),name:'Nuovo box',tier:'core',entries:[blankWineClubEntry()],inboundShipping:0,salePrice:0};
}
function WineClubCalculator({onClose}){
  const [boxes,setBoxes] = useState(loadWineClubBoxes);
  const [selectedId,setSelectedId] = useState(()=>{const b=loadWineClubBoxes();return b.length?b[0].id:null;});

  useEffect(()=>{ localStorage.setItem('ciliegio_wineclub_boxes',JSON.stringify(boxes)); },[boxes]);

  const box = boxes.find(b=>b.id===selectedId) || null;
  const updateBox = (patch)=> setBoxes(prev=>prev.map(b=>b.id===selectedId?{...b,...patch}:b));
  const updateEntry = (entryId,patch)=> updateBox({entries:box.entries.map(e=>e.id===entryId?{...e,...patch}:e)});
  const addEntry = ()=> updateBox({entries:[...box.entries,blankWineClubEntry()]});
  const removeEntry = (entryId)=> updateBox({entries:box.entries.filter(e=>e.id!==entryId)});

  const addBox = ()=>{
    const nb = blankWineClubBox();
    setBoxes(prev=>[...prev,nb]);
    setSelectedId(nb.id);
  };
  const deleteBox = (id)=>{
    setBoxes(prev=>prev.filter(b=>b.id!==id));
    if(selectedId===id) setSelectedId(prev=>{ const rest=boxes.filter(b=>b.id!==id); return rest.length?rest[0].id:null; });
  };

  // Totali calcolati
  const totalBottles = box ? box.entries.reduce((s,e)=>s+(Number(e.qty)||0),0) : 0;
  const totalWineCost = box ? box.entries.reduce((s,e)=>s+(Number(e.costPerBottle)||0)*(Number(e.qty)||0),0) : 0;
  const inboundShipping = box ? (Number(box.inboundShipping)||0) : 0;
  const totalCost = totalWineCost + inboundShipping;
  const costPerBottle = totalBottles>0 ? totalCost/totalBottles : 0;
  const salePrice = box ? (Number(box.salePrice)||0) : 0;
  const margin = salePrice - totalCost;
  const marginPct = salePrice>0 ? (margin/salePrice*100) : 0;
  const targetBottles = box ? WINECLUB_TIERS[box.tier].bottles : 0;

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.9)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center',padding:'12px'}}>
      <div className="bg-dark border gold-border rounded-lg shadow-xl" style={{maxWidth:'760px',width:'100%',maxHeight:'92vh',display:'flex',flexDirection:'column'}}>
        <div className="flex justify-between items-center p-4 border-b border-[#D4AF37]">
          <h2 className="gold-text font-bold uppercase tracking-widest" style={{fontSize:'14px'}}>🍷 Calcolatore Wine Club</h2>
          <button onClick={onClose} className="w-8 h-8 rounded border gold-border gold-text hover:bg-[#D4AF37] hover:text-black transition font-bold text-lg leading-none">✕</button>
        </div>

        <div style={{display:'flex',flex:1,minHeight:0,overflow:'hidden'}}>
          {/* Lista box salvati */}
          <div style={{width:'190px',borderRight:'1px solid #333',overflowY:'auto',padding:'10px',flexShrink:0}}>
            <button onClick={addBox} className="w-full p-2 rounded gold-bg font-bold mb-3" style={{fontSize:'11px'}}>+ Nuovo box</button>
            {boxes.map(b=>(
              <div key={b.id} onClick={()=>setSelectedId(b.id)}
                className={`rounded p-2 mb-2 cursor-pointer border ${b.id===selectedId?'gold-border bg-[#1a1a1a]':'border-gray-800 hover:border-gray-600'}`}>
                <div className="font-bold text-gray-200 truncate" style={{fontSize:'11px'}}>{b.name||'(senza nome)'}</div>
                <div className="text-gray-500" style={{fontSize:'10px'}}>{WINECLUB_TIERS[b.tier].label} · {b.entries.reduce((s,e)=>s+(Number(e.qty)||0),0)} bott.</div>
                <button onClick={(e)=>{e.stopPropagation();deleteBox(b.id);}}
                  className="text-red-400 hover:text-red-300 mt-1" style={{fontSize:'9px'}}>✕ elimina</button>
              </div>
            ))}
            {boxes.length===0&&<p className="text-gray-500 italic text-center" style={{fontSize:'11px'}}>Nessun box salvato</p>}
          </div>

          {/* Editor box selezionato */}
          <div style={{flex:1,overflowY:'auto',padding:'14px'}}>
            {!box
              ? <p className="text-gray-500 italic text-center" style={{fontSize:'12px'}}>Crea un nuovo box per iniziare</p>
              : <>
                <div className="mb-3">
                  <label className="block text-gray-400 mb-1" style={{fontSize:'10px'}}>Nome box</label>
                  <input value={box.name} onChange={e=>updateBox({name:e.target.value})}
                    className="w-full p-2 rounded" style={{fontSize:'12px'}}/>
                </div>

                <div className="mb-4">
                  <label className="block text-gray-400 mb-1" style={{fontSize:'10px'}}>Tier</label>
                  <div style={{display:'flex',gap:'6px'}}>
                    {Object.keys(WINECLUB_TIERS).map(t=>(
                      <button key={t} onClick={()=>updateBox({tier:t})}
                        className={`flex-1 p-2 rounded border font-bold uppercase transition
                          ${box.tier===t?'gold-bg border-[#D4AF37]':'border-gray-700 text-gray-400 hover:border-[#D4AF37]'}`}
                        style={{fontSize:'10px'}}>
                        {WINECLUB_TIERS[t].label}<br/>{WINECLUB_TIERS[t].bottles} bott.
                      </button>
                    ))}
                  </div>
                  {totalBottles!==targetBottles&&
                    <p className="mt-1" style={{fontSize:'10px',color:'#facc15'}}>⚠️ {totalBottles} bottiglie inserite, il tier {WINECLUB_TIERS[box.tier].label} prevede {targetBottles}.</p>}
                </div>

                <div className="mb-3">
                  <div className="flex justify-between items-center mb-1">
                    <label className="text-gray-400" style={{fontSize:'10px'}}>Vini nel box</label>
                    <button onClick={addEntry} className="px-2 py-1 rounded border gold-border gold-text" style={{fontSize:'10px'}}>+ Aggiungi vino</button>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                    {box.entries.map(e=>(
                      <div key={e.id} className="bg-[#1a1a1a] rounded p-2" style={{display:'grid',gridTemplateColumns:'1.2fr 1.4fr 0.7fr 0.5fr auto',gap:'6px',alignItems:'center'}}>
                        <input placeholder="Cantina" value={e.winery} onChange={ev=>updateEntry(e.id,{winery:ev.target.value})}
                          className="p-1 rounded" style={{fontSize:'11px'}}/>
                        <input placeholder="Vino" value={e.wine} onChange={ev=>updateEntry(e.id,{wine:ev.target.value})}
                          className="p-1 rounded" style={{fontSize:'11px'}}/>
                        <input type="number" step="0.01" placeholder="€/bott." value={e.costPerBottle}
                          onChange={ev=>updateEntry(e.id,{costPerBottle:ev.target.value})}
                          className="p-1 rounded" style={{fontSize:'11px'}}/>
                        <input type="number" placeholder="Qty" value={e.qty}
                          onChange={ev=>updateEntry(e.id,{qty:ev.target.value})}
                          className="p-1 rounded" style={{fontSize:'11px'}}/>
                        <button onClick={()=>removeEntry(e.id)} className="text-red-400 hover:text-red-300 font-bold" style={{fontSize:'14px'}}>✕</button>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-3 mb-4">
                  <div>
                    <label className="block text-gray-400 mb-1" style={{fontSize:'10px'}}>Spedizione interna totale (€)</label>
                    <input type="number" step="0.01" value={box.inboundShipping}
                      onChange={e=>updateBox({inboundShipping:e.target.value})}
                      className="w-full p-2 rounded" style={{fontSize:'12px'}}/>
                    <p className="text-gray-600 mt-1" style={{fontSize:'9px'}}>Costo per portare tutte le bottiglie di questo box a casa vostra</p>
                  </div>
                  <div>
                    <label className="block text-gray-400 mb-1" style={{fontSize:'10px'}}>Prezzo di vendita del box (€)</label>
                    <input type="number" step="0.01" value={box.salePrice}
                      onChange={e=>updateBox({salePrice:e.target.value})}
                      className="w-full p-2 rounded" style={{fontSize:'12px'}}/>
                    <p className="text-gray-600 mt-1" style={{fontSize:'9px'}}>Quanto pagherà il cliente per questo box (spedizione al cliente esclusa)</p>
                  </div>
                </div>

                <div className="border-t border-gray-800 pt-3" style={{fontSize:'12px'}}>
                  <div className="flex justify-between text-gray-400 mb-1"><span>Bottiglie totali:</span><span className="text-gray-200">{totalBottles}</span></div>
                  <div className="flex justify-between text-gray-400 mb-1"><span>Costo vini:</span><span className="text-gray-200">€{totalWineCost.toFixed(2)}</span></div>
                  <div className="flex justify-between text-gray-400 mb-1"><span>Spedizione interna:</span><span className="text-gray-200">€{inboundShipping.toFixed(2)}</span></div>
                  <div className="flex justify-between text-gray-400 mb-1"><span>Costo totale box:</span><span className="text-gray-200">€{totalCost.toFixed(2)}</span></div>
                  <div className="flex justify-between text-gray-400 mb-2"><span>Costo medio/bottiglia:</span><span className="text-gray-200">€{costPerBottle.toFixed(2)}</span></div>
                  <div className="flex justify-between font-bold gold-text border-t border-gray-800 pt-2" style={{fontSize:'14px'}}>
                    <span>Margine:</span>
                    <span>€{margin.toFixed(2)} ({marginPct.toFixed(1)}%)</span>
                  </div>
                </div>
              </>
            }
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
