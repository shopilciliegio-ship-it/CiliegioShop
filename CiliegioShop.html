    e('div',{className:'clayout'},
      e('div',{className:'ccol'},
        e('div',{className:'flex gap-1 flex-wrap mb-2'},tabs.map(function(t){return e('button',{key:t,onClick:function(){setTab(t);},className:'px-2 py-1 rounded font-bold uppercase border transition '+(tab===t?'gold-bg border-[#D4AF37]':'border-gray-700 text-gray-400'),style:{fontSize:'10px'}},t);})),
        dc.map(function(cat){var ps=flt.filter(function(x){return x.category===cat;});if(!ps.length)return null;
          return e('div',{key:cat,className:'mb-4'},
            e('h2',{className:'font-bold gold-text border-b border-gray-800 pb-1 mb-2',style:{fontSize:'13px'}},cat),
            (isUSCA&&cat==='EVO OIL')?e('p',{className:'text-yellow-600 mb-1',style:{fontSize:'10px'}},'⚠️ Large formats (3L/5L) not available for US/Canada.'):null,
            e('div',{className:'grid gap-2 pgrid'},ps.map(function(x){return e(PCard,{key:x.id,p:x,onAdd:addItem});})));})
      ),
      e('div',{className:'cartcol bg-[#111] rounded border gold-border',style:{padding:'8px'}},
        e('h2',{className:'gold-text font-bold border-b border-gray-800 pb-1 mb-2',style:{fontSize:'13px'}},'🛒 Cart'),
        e(CartPanel,pp))));
}

/* App */
function App(){
  var r1=useState(1),step=r1[0],setStep=r1[1];
  var r2=useState('STANDARD'),sp=r2[0],setSp=r2[1];
  var r3=useState([]),cart=r3[0],setCart=r3[1];
  var r4=useState([]),prods=r4[0],setProds=r4[1];
  var r5=useState(null),ship=r5[0],setShip=r5[1];
  var r6=useState(true),loading=r6[0],setLoad=r6[1];
  var r7=useState(''),err=r7[0],setErr=r7[1];
  var r8=useState(merge(BL,{})),form=r8[0],setForm=r8[1];
  var r9=useState(''),nt=r9[0],setNt=r9[1];

  useEffect(function(){
    Promise.all([fetch(CFG.products).then(function(r){if(!r.ok)throw 0;return r.json();}),fetch(CFG.shipping).then(function(r){if(!r.ok)throw 0;return r.json();})
    ]).then(function(res){setProds(res[0]);setShip(res[1]);setLoad(false);}).catch(function(){setErr('Unable to load data. Check window.CFG URLs.');setLoad(false);});
  },[]);

  function reset(){setStep(1);setCart([]);setSp('STANDARD');setForm(merge(BL,{}));setNt('');}
  var qty=cart.reduce(function(s,i){return s+i.qty;},0);
  var prod=cart.reduce(function(s,i){return s+i.price*i.qty;},0);
  var wine=cart.some(function(i){return i.category==='WINE'||i.category==='SPARKLING';});
  var ak=rkey(form.natCode,sp,wine);
  var ar=ship&&ak?ship[ak]:null;
  var sc=qty>0&&ar?srate(ar,qty):0;
  var duty=ak&&ak.indexOf('USA_WINE')===0?prod*.1:0;
  var total=prod+sc+duty;
  var dl=dlbl(ak,sp);
  var spSel=['US','CA'].indexOf(form.natCode)>=0;
  var tots={qty:qty,prod:prod,ship:sc,duty:duty,final:total};

  function sendWA(){
    var em=form.emailUser+'@'+form.emailDomain;
    var m='*NEW ORDER*%0A%0A*CUSTOMER:*%0A'+form.name+' '+form.surname+'%0A';
    m+='Nationality: '+form.nationality+'%0AEmail: '+em+'%0APhone: '+form.mobile+'%0A';
    m+='Address: '+form.address+', '+form.zip+' '+form.city+' ('+form.province+'), '+form.state+'%0A%0A*PRODUCTS:*%0A';
    cart.forEach(function(c){m+='- '+c.qty+'x '+c.name+' (€'+c.price.toFixed(2)+')%0A';});
    m+='%0AProducts Total: €'+prod.toFixed(2);
    if(duty>0)m+='%0AImport Duties (10%): €'+duty.toFixed(2);
    m+='%0AShipping ('+(ar?ar.label:'N/A - to be quoted')+'): €'+sc.toFixed(2)+'%0A*FINAL TOTAL: €'+total.toFixed(2)+'*';
    window.open('https://wa.me/'+CFG.whatsapp+'?text='+m,'_blank');
  }

  if(loading)return e('div',{className:'min-h-screen bg-black flex items-center justify-center'},e('div',{className:'text-center'},e('div',{style:{fontSize:'3rem'},className:'animate-pulse'},'🍷'),e('p',{className:'gold-text tracking-widest text-sm uppercase mt-4'},'Loading catalog…')));
  if(err)return e('div',{className:'min-h-screen bg-black flex items-center justify-center p-8'},e('div',{className:'text-center'},e('div',{style:{fontSize:'2rem'}},'⚠️'),e('p',{className:'gold-text text-lg mt-3'},'Configuration Error'),e('p',{className:'text-gray-400 text-sm mt-2'},err)));

  return e('div',{className:'min-h-screen bg-black text-white',style:{padding:step===3?'8px':'16px 16px 32px'}},
    e('div',{className:'w-full',style:{maxWidth:step===3?'100%':'768px',margin:'0 auto'}},
      e('div',{className:'relative text-center mb-4 flex flex-col items-center'},
        e('button',{onClick:reset,className:'absolute left-0 top-0 px-3 py-2 rounded border gold-border gold-text text-xs uppercase tracking-widest hover:bg-[#D4AF37] hover:text-black transition font-bold'},'⌂ Home'),
        e(Logo)),
      step===1?e(FormStep,{form:form,setForm:setForm,natTxt:nt,setNat:setNt,onNext:function(){setStep(2);}}):null,
      step===2?e(SummaryStep,{form:form,onEdit:function(){setStep(1);},onConfirm:function(){setStep(3);}}):null,
      step===3?e(CatalogStep,{products:prods,cart:cart,setCart:setCart,sp:sp,setSp:setSp,spSel:spSel,aRate:ar,hd:duty>0,dl:dl,tots:tots,send:sendWA,natCode:form.natCode,province:form.province}):null));
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
})();
</script>
</body>
