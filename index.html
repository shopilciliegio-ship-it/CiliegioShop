<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il Ciliegio — Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { gold: '#D4AF37', dark: '#121212' } } }
    }
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { background:#000; color:#fff; font-family:sans-serif; margin:0; padding:0; }
    .gold-border { border-color:#D4AF37; }
    .gold-text   { color:#D4AF37; }
    .gold-bg     { background-color:#D4AF37; color:#000; }
    input, select { background:#1a1a1a; color:#fff; border:1px solid #333; outline:none; }
    input:focus   { border-color:#D4AF37; }
    input.err-field { border-color:#ef4444 !important; }
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:#000; }
    ::-webkit-scrollbar-thumb { background:#D4AF37; border-radius:4px; }
    .prod-img          { width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:3px; background:#1a1a1a; }
    .prod-img-fallback { width:100%; aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; font-size:1.4rem; background:#1a1a1a; border-radius:3px; }
    /* Product grid: small on mobile, larger on desktop */
    .prod-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
    @media (min-width: 768px) {
      .prod-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }

    /* ── Catalog page layout ── */
    /* Desktop (≥768px): side-by-side, catalog scrolls freely */
    @media (min-width: 768px) {
      .catalog-layout  { display:flex; flex-direction:row; gap:16px; align-items:flex-start; }
      .catalog-col     { flex:1; min-width:0; }
      .cart-col        { width:288px; flex-shrink:0; position:sticky; top:12px; }
    }

    /* Mobile (<768px): viewport split ~62/38 */
    @media (max-width: 767px) {
      /* Full page takes exactly 100dvh, no outer scroll */
      .catalog-page    { height: calc(var(--vh, 1vh) * 100 - 90px); display:flex; flex-direction:column; gap:0; }
      .catalog-layout  { flex:1; display:flex; flex-direction:column; min-height:0; gap:0; }
      .catalog-col     { flex:1; min-height:0; overflow-y:auto; padding-bottom:4px; }
      .cart-col        { flex:0 0 38vh; border-top:1px solid #D4AF37; overflow-y:auto; padding-top:8px; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script>
  window.CFG = {
    products : "https://raw.githubusercontent.com/shopilciliegio-ship-it/CiliegioShop/refs/heads/main/products.json",
    shipping : "https://raw.githubusercontent.com/shopilciliegio-ship-it/CiliegioShop/refs/heads/main/shipping.json",
    imgBase  : "https://raw.githubusercontent.com/shopilciliegio-ship-it/CiliegioShop/refs/heads/main/",
    whatsapp : "393357655171"
  };
  // Fix iOS Safari: imposta --vh come 1% dell'altezza visibile reale
  function setVh(){ document.documentElement.style.setProperty('--vh', window.innerHeight*0.01+'px'); }
  setVh();
  window.addEventListener('resize', setVh);
  window.addEventListener('orientationchange', ()=>setTimeout(setVh,200));
</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Constants ─────────────────────────────────────────────── */
const COUNTRIES = [
  {name:'AUSTRALIA',      code:'AU', prefix:'+61',  flag:'🇦🇺'},
  {name:'AUSTRIA',        code:'AT', prefix:'+43',  flag:'🇦🇹'},
  {name:'BELGIUM',        code:'BE', prefix:'+32',  flag:'🇧🇪'},
  {name:'BULGARIA',       code:'BG', prefix:'+359', flag:'🇧🇬'},
  {name:'CANADA',         code:'CA', prefix:'+1',   flag:'🇨🇦'},
  {name:'CROATIA',        code:'HR', prefix:'+385', flag:'🇭🇷'},
  {name:'CYPRUS',         code:'CY', prefix:'+357', flag:'🇨🇾'},
  {name:'CZECH REPUBLIC', code:'CZ', prefix:'+420', flag:'🇨🇿'},
  {name:'DENMARK',        code:'DK', prefix:'+45',  flag:'🇩🇰'},
  {name:'ESTONIA',        code:'EE', prefix:'+372', flag:'🇪🇪'},
  {name:'FINLAND',        code:'FI', prefix:'+358', flag:'🇫🇮'},
  {name:'FRANCE',         code:'FR', prefix:'+33',  flag:'🇫🇷'},
  {name:'GERMANY',        code:'DE', prefix:'+49',  flag:'🇩🇪'},
  {name:'GREECE',         code:'GR', prefix:'+30',  flag:'🇬🇷'},
  {name:'HUNGARY',        code:'HU', prefix:'+36',  flag:'🇭🇺'},
  {name:'IRELAND',        code:'IE', prefix:'+353', flag:'🇮🇪'},
  {name:'ITALY',          code:'IT', prefix:'+39',  flag:'🇮🇹'},
  {name:'LATVIA',         code:'LV', prefix:'+371', flag:'🇱🇻'},
  {name:'LITHUANIA',      code:'LT', prefix:'+370', flag:'🇱🇹'},
  {name:'LUXEMBOURG',     code:'LU', prefix:'+352', flag:'🇱🇺'},
  {name:'MALTA',          code:'MT', prefix:'+356', flag:'🇲🇹'},
  {name:'NETHERLANDS',    code:'NL', prefix:'+31',  flag:'🇳🇱'},
  {name:'NORWAY',         code:'NO', prefix:'+47',  flag:'🇳🇴'},
  {name:'POLAND',         code:'PL', prefix:'+48',  flag:'🇵🇱'},
  {name:'PORTUGAL',       code:'PT', prefix:'+351', flag:'🇵🇹'},
  {name:'ROMANIA',        code:'RO', prefix:'+40',  flag:'🇷🇴'},
  {name:'SLOVAKIA',       code:'SK', prefix:'+421', flag:'🇸🇰'},
  {name:'SLOVENIA',       code:'SI', prefix:'+386', flag:'🇸🇮'},
  {name:'SPAIN',          code:'ES', prefix:'+34',  flag:'🇪🇸'},
  {name:'SWEDEN',         code:'SE', prefix:'+46',  flag:'🇸🇪'},
  {name:'SWITZERLAND',    code:'CH', prefix:'+41',  flag:'🇨🇭'},
  {name:'UNITED KINGDOM', code:'GB', prefix:'+44',  flag:'🇬🇧'},
  {name:'UNITED STATES',  code:'US', prefix:'+1',   flag:'🇺🇸'},
];

const ZONE_MAP = {
  GB:'UK',CH:'SWITZERLAND',NO:'NORWAY',
  DE:'EU_ZONE_1',BE:'EU_ZONE_1',NL:'EU_ZONE_1',LU:'EU_ZONE_1',
  FR:'EU_ZONE_2',DK:'EU_ZONE_2',AT:'EU_ZONE_2',
  ES:'EU_ZONE_3',SE:'EU_ZONE_4',PT:'EU_ZONE_4',
  IE:'EU_ZONE_5',SI:'EU_ZONE_5',
  FI:'EU_ZONE_6',HR:'EU_ZONE_6',GR:'EU_ZONE_6',
  CY:'EU_ZONE_7',MT:'EU_ZONE_7',
  PL:'EU_ZONE_8',CZ:'EU_ZONE_8',SK:'EU_ZONE_8',HU:'EU_ZONE_8',
  BG:'EU_ZONE_9',EE:'EU_ZONE_9',LV:'EU_ZONE_9',LT:'EU_ZONE_9',RO:'EU_ZONE_9',
};

const USA_SPECIAL = ['HI','AK','PR','AL','AR','UT','MS','VI'];
const CA_NO_WINE  = ['NEW BRUNSWICK','NEWFOUNDLAND','NORTHWEST TERRITORIES',
  'NOVA SCOTIA','NUNAVUT','PRINCE EDWARD ISLAND','SASKATCHEWAN','YUKON'];
const QTY_TIERS   = [3,6,12,18,24,30,36];
const CATEGORIES  = ['WINE','SPARKLING','DISTILLATES','EVO OIL','FLOURS','CEREALS','LEGUMES','SWEETS'];
const US_CA_BLOCK = [24,25];
const BLANK = {nationality:'',natCode:'',name:'',surname:'',address:'',
  zip:'',city:'',province:'',state:'',mobile:'',emailUser:'',emailDomain:''};

/* ── Helpers ───────────────────────────────────────────────── */
function shipRate(obj,qty){
  if(!obj) return 0;
  const t=QTY_TIERS.find(t=>qty<=t)||QTY_TIERS[QTY_TIERS.length-1];
  return parseFloat(obj.rates[String(t)])||0;
}
function dLabel(key,speed){
  if(!key) return '';
  if(key.startsWith('EU_')||['UK','SWITZERLAND','NORWAY'].includes(key)) return 'Delivery within 7 working days';
  if(speed==='EXPRESS'||key.includes('EXPRESS')) return 'Delivery within 9 working days';
  return 'Delivery within 20 working days';
}
function rateKey(code,speed,wine){
  if(code==='US'){
    if(wine) return speed==='EXPRESS'?'USA_WINE_EXPRESS':'USA_WINE_STANDARD';
    return speed==='EXPRESS'?'USA_EXTRA_EXPRESS':'USA_EXTRA_STANDARD';
  }
  if(code==='CA') return speed==='EXPRESS'?'CANADA_EXPRESS':'CANADA_STANDARD';
  return ZONE_MAP[code]||null;
}
function validDomain(d){ return /^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/.test(d); }

// Restituisce la label dello scaglione applicato — es. "(4–6 pieces)"
function tierLabel(qty){
  if(qty<=0) return '';
  const steps = [[1,3],[4,6],[7,12],[13,18],[19,24],[25,30],[31,36]];
  for(const [lo,hi] of steps){
    if(qty>=lo&&qty<=hi) return `(${lo}–${hi} pieces)`;
  }
  return '(31–36 pieces)'; // oltre 36 usa lo stesso scaglione massimo
}

/* ── App ───────────────────────────────────────────────────── */
function App(){
  const [step,setStep]    = useState(1);
  const [speed,setSpeed]  = useState('STANDARD');
  const [cart,setCart]    = useState([]);
  const [prods,setProds]  = useState([]);
  const [ship,setShip]    = useState(null);
  const [loading,setLoad] = useState(true);
  const [err,setErr]      = useState('');
  const [form,setForm]    = useState({...BLANK});
  const [natTxt,setNat]   = useState('');

  useEffect(()=>{
    Promise.all([
      fetch(window.CFG.products).then(r=>{if(!r.ok)throw 0;return r.json();}),
      fetch(window.CFG.shipping).then(r=>{if(!r.ok)throw 0;return r.json();}),
    ]).then(([p,s])=>{setProds(p);setShip(s);setLoad(false);})
      .catch(()=>{setErr('Unable to load data. Check the URLs in window.CFG.');setLoad(false);});
  },[]);

  const reset=()=>{ setStep(1);setCart([]);setSpeed('STANDARD');setForm({...BLANK});setNat(''); };

  const qty   = cart.reduce((s,i)=>s+i.qty,0);
  const prod  = cart.reduce((s,i)=>s+i.price*i.qty,0);
  // Vino O Sparkling → listino USA_WINE (con dazi)
  const wine  = cart.some(i=>i.category==='WINE'||i.category==='SPARKLING');
  const aKey  = rateKey(form.natCode,speed,wine);
  const aRate = ship&&aKey?ship[aKey]:null;
  const sc    = qty>0&&aRate?shipRate(aRate,qty):0;
  const duty  = aKey&&aKey.startsWith('USA_WINE')?prod*0.1:0;
  const total = prod+sc+duty;
  const dl    = dLabel(aKey,speed);
  const spSel = ['US','CA'].includes(form.natCode);
  const totals= {qty,prod,ship:sc,duty,final:total};

  const sendWA=()=>{
    const em=`${form.emailUser}@${form.emailDomain}`;
    let m=`*NEW ORDER*%0A%0A*CUSTOMER:*%0A${form.name} ${form.surname}%0A`;
    m+=`Nationality: ${form.nationality}%0AEmail: ${em}%0APhone: ${form.mobile}%0A`;
    m+=`Address: ${form.address}, ${form.zip} ${form.city} (${form.province}), ${form.state}%0A`;
    m+=`%0A*PRODUCTS:*%0A`;
    cart.forEach(c=>{m+=`- ${c.qty}x ${c.name} (€${c.price.toFixed(2)})%0A`;});
    m+=`%0AProducts Total: €${prod.toFixed(2)}`;
    if(duty>0) m+=`%0AImport Duties (10%): €${duty.toFixed(2)}`;
    m+=`%0AShipping (${aRate?aRate.label:'N/A'}): €${sc.toFixed(2)}%0A*FINAL TOTAL: €${total.toFixed(2)}*`;
    window.open(`https://wa.me/${window.CFG.whatsapp}?text=${m}`,'_blank');
  };

  if(loading) return(
    <div className="min-h-screen bg-black flex items-center justify-center">
      <div className="text-center"><div className="text-5xl mb-4 animate-pulse">🍷</div>
      <p className="gold-text tracking-widest text-sm uppercase">Loading catalog…</p></div>
    </div>);
  if(err) return(
    <div className="min-h-screen bg-black flex items-center justify-center p-8">
      <div className="text-center"><div className="text-4xl mb-4">⚠️</div>
      <p className="gold-text text-lg mb-2">Configuration Error</p>
      <p className="text-gray-400 text-sm">{err}</p></div>
    </div>);

  return(
    <div className="min-h-screen bg-black text-white" style={{padding: step===3?'8px':'16px 16px 32px'}}>
      <div className="w-full" style={{maxWidth: step===3?'100%':'768px', margin:'0 auto'}}>

        {/* Header */}
        <div className="relative text-center mb-4 flex flex-col items-center">
          <button onClick={reset}
            className="absolute left-0 top-0 px-3 py-2 rounded border gold-border gold-text text-xs uppercase tracking-widest hover:bg-[#D4AF37] hover:text-black transition font-bold">
            ⌂ Home
          </button>
          <img id="logo-img" src="https://raw.githubusercontent.com/shopilciliegio-ship-it/CiliegioShop/refs/heads/main/ciliegio_trasparente.png" alt="Il Ciliegio" className="h-16 object-contain"
            onLoad={()=>{const t=document.getElementById('logo-txt');if(t)t.style.display='none';}}
            onError={()=>{const i=document.getElementById('logo-img');if(i)i.style.display='none';const t=document.getElementById('logo-txt');if(t)t.style.display='block';}}/>
          <h1 id="logo-txt" className="text-2xl font-bold gold-text tracking-widest" style={{display:'none'}}>IL CILIEGIO</h1>
        </div>

        {step===1 && <FormStep form={form} setForm={setForm} natTxt={natTxt} setNat={setNat} onNext={()=>setStep(2)}/>}
        {step===2 && <SummaryStep form={form} onEdit={()=>setStep(1)} onConfirm={()=>setStep(3)}/>}
        {step===3 && <CatalogStep products={prods} cart={cart} setCart={setCart}
          speed={speed} setSpeed={setSpeed} spSel={spSel}
          aRate={aRate} aKey={aKey} hasDuty={duty>0} dl={dl}
          totals={totals} onSend={sendWA} natCode={form.natCode} province={form.province}/>}
      </div>
    </div>
  );
}

/* ── FormStep ──────────────────────────────────────────────── */
function FormStep({form,setForm,natTxt,setNat,onNext}){
  const [showNat,setShowNat] = useState(false);
  const [domErr,setDomErr]   = useState(false);
  const nations = COUNTRIES.filter(c=>c.name.startsWith(natTxt.toUpperCase()));

  const pickCountry=(c)=>{
    setForm({...BLANK,nationality:c.name,natCode:c.code,mobile:c.prefix+' '});
    setNat(c.name); setShowNat(false);
  };

  const onZipBlur=async(e)=>{
    const z=e.target.value.trim();
    if(!z||!form.natCode) return;
    const code=form.natCode==='GB'?'gb':form.natCode.toLowerCase();
    try{
      const r=await fetch(`https://api.zippopotam.us/${code}/${z}`);
      if(r.ok){
        const d=await r.json(); const p=d.places[0];
        setForm(f=>({...f,
          city:p['place name'].toUpperCase(),
          state:p['state'].toUpperCase(),
          province:p['state abbreviation'].toUpperCase()
        }));
      }
    }catch(_){}
  };

  const ok=form.nationality&&form.name&&form.surname&&form.address&&
    form.zip&&form.city&&form.province&&form.state&&
    form.mobile&&form.emailUser&&form.emailDomain&&validDomain(form.emailDomain);

  return(
    <div className="bg-dark p-6 rounded-lg border gold-border shadow-lg shadow-yellow-900/20">
      <div className="flex flex-col sm:flex-row sm:items-baseline sm:justify-between border-b border-[#D4AF37] pb-2 mb-5 gap-1">
        <h2 className="text-xl gold-text">Customer Registration</h2>
        <span className="text-xs gold-text opacity-70 italic">all fields are required</span>
      </div>
      <div className="space-y-4">

        {/* Nationality */}
        <div className="relative">
          <label className="block text-xs text-gray-400 mb-1">Nationality</label>
          <input className="w-full p-3 rounded uppercase" type="text"
            placeholder="Start typing country name…" value={natTxt}
            onFocus={()=>setShowNat(true)}
            onChange={e=>{
              const v=e.target.value.toUpperCase(); setNat(v);
              if(form.nationality&&v!==form.nationality) setForm(f=>({...f,nationality:'',natCode:''}));
            }}/>
          {showNat&&natTxt&&!form.nationality&&(
            <div className="absolute z-30 w-full mt-1 bg-[#1a1a1a] border gold-border rounded max-h-44 overflow-y-auto">
              {nations.length>0?nations.map(c=>(
                <div key={c.code} className="p-3 hover:bg-[#333] cursor-pointer flex items-center gap-2 uppercase text-sm"
                  onClick={()=>pickCountry(c)}>{c.flag} {c.name} ({c.code})</div>
              )):<div className="p-3 text-gray-500 text-sm">No country found…</div>}
            </div>)}
        </div>

        {/* ZIP — auto-fills city/province/state on blur */}
        <div>
          <label className="block text-xs text-gray-400 mb-1">ZIP Code
            <span className="ml-2 text-gray-600 italic text-xs">(auto-fills city & region on blur)</span>
          </label>
          <input className="w-full p-3 rounded uppercase" type="text"
            placeholder={form.natCode?"Enter ZIP…":"Select nationality first"}
            value={form.zip}
            onChange={e=>setForm(f=>({...f,zip:e.target.value.toUpperCase()}))}
            onBlur={onZipBlur}/>
        </div>

        {/* Name / Surname */}
        <div className="grid grid-cols-2 gap-3">
          <div><label className="block text-xs text-gray-400 mb-1">First Name</label>
            <input className="w-full p-3 rounded uppercase" type="text" value={form.name}
              onChange={e=>setForm(f=>({...f,name:e.target.value.toUpperCase()}))}/>
          </div>
          <div><label className="block text-xs text-gray-400 mb-1">Last Name</label>
            <input className="w-full p-3 rounded uppercase" type="text" value={form.surname}
              onChange={e=>setForm(f=>({...f,surname:e.target.value.toUpperCase()}))}/>
          </div>
        </div>

        {/* Address */}
        <div><label className="block text-xs text-gray-400 mb-1">Full Address</label>
          <input className="w-full p-3 rounded uppercase" type="text" placeholder="Street, number…"
            value={form.address} onChange={e=>setForm(f=>({...f,address:e.target.value.toUpperCase()}))}/>
        </div>

        {/* City */}
        <div><label className="block text-xs text-gray-400 mb-1">City</label>
          <input className="w-full p-3 rounded uppercase" type="text"
            value={form.city} onChange={e=>setForm(f=>({...f,city:e.target.value.toUpperCase()}))}/>
        </div>

        {/* Province / State */}
        <div className="grid grid-cols-2 gap-3">
          <div><label className="block text-xs text-gray-400 mb-1">Province / County</label>
            <input className="w-full p-3 rounded uppercase" type="text" value={form.province}
              onChange={e=>setForm(f=>({...f,province:e.target.value.toUpperCase()}))}/>
          </div>
          <div><label className="block text-xs text-gray-400 mb-1">State / Region</label>
            <input className="w-full p-3 rounded uppercase" type="text" value={form.state}
              onChange={e=>setForm(f=>({...f,state:e.target.value.toUpperCase()}))}/>
          </div>
        </div>

        {/* Mobile */}
        <div><label className="block text-xs text-gray-400 mb-1">Mobile Number</label>
          <input className="w-full p-3 rounded" type="text" placeholder="+1 234 567 8900"
            value={form.mobile} onChange={e=>setForm(f=>({...f,mobile:e.target.value.replace(/[^\d+\s]/g,'')}))}/>
        </div>

        {/* Email */}
        <div><label className="block text-xs text-gray-400 mb-1">Email Address</label>
          <div className="flex w-full items-center gap-2">
            <input type="text" className="min-w-0 flex-1 p-3 rounded text-right lowercase"
              placeholder="username" value={form.emailUser}
              onChange={e=>setForm(f=>({...f,emailUser:e.target.value.replace(/\s/g,'').toLowerCase()}))}/>
            <span className="gold-text font-bold text-xl shrink-0">@</span>
            <input type="text" className={`min-w-0 flex-1 p-3 rounded lowercase${domErr?' err-field':''}`}
              placeholder="provider.com" value={form.emailDomain}
              onChange={e=>{setDomErr(false);setForm(f=>({...f,emailDomain:e.target.value.replace(/\s/g,'').toLowerCase()}));}}
              onBlur={e=>{const v=e.target.value.trim();setDomErr(v!==''&&!validDomain(v));}}/>
          </div>
          {domErr&&<p className="text-xs text-red-400 mt-1">⚠️ Use format: gmail.com or provider.it</p>}
        </div>
      </div>

      <button onClick={onNext} disabled={!ok}
        className={`w-full mt-8 p-4 rounded font-bold uppercase tracking-widest transition-all
          ${ok?'gold-bg hover:bg-yellow-600':'bg-gray-800 text-gray-500 cursor-not-allowed'}`}>
        Continue to Summary
      </button>
    </div>
  );
}

/* ── SummaryStep ───────────────────────────────────────────── */
function SummaryStep({form,onEdit,onConfirm}){
  return(
    <div className="bg-dark p-6 rounded-lg border gold-border shadow-lg shadow-yellow-900/20">
      <h2 className="text-xl gold-text mb-5 border-b border-[#D4AF37] pb-2 text-center">Data Summary</h2>
      <div className="space-y-3 text-sm">
        {[['Customer',`${form.name} ${form.surname}`],
          ['Nationality',form.nationality],
          ['Email',`${form.emailUser}@${form.emailDomain}`],
          ['Phone',form.mobile],
          ['Address',<>{form.address}<br/>{form.zip} {form.city} ({form.province})<br/>{form.state}</>],
        ].map(([l,v],i)=>(
          <div key={i} className="flex justify-between border-b border-gray-800 pb-2">
            <span className="text-gray-400">{l}:</span>
            <span className="font-bold text-right">{v}</span>
          </div>))}
      </div>
      <div className="flex gap-4 mt-8">
        <button onClick={onEdit} className="flex-1 p-4 rounded border gold-border gold-text hover:bg-[#D4AF37] hover:text-black uppercase font-bold text-xs tracking-widest">Edit</button>
        <button onClick={onConfirm} className="flex-1 p-4 rounded gold-bg hover:bg-yellow-600 uppercase font-bold text-xs tracking-widest">Confirm &amp; Go to Catalog</button>
      </div>
    </div>
  );
}

/* ── ProductCard ───────────────────────────────────────────── */
function ProductCard({p,onAdd}){
  const [imgErr,setImgErr]=useState(false);
  const src=p.img?window.CFG.imgBase+p.img:null;
  return(
    <div className="bg-dark rounded border border-gray-800 hover:border-[#D4AF37] text-center flex flex-col gap-1 transition-all overflow-hidden" style={{padding:'6px'}}>
      {src&&!imgErr
        ?<img src={src} alt={p.name} className="prod-img" onError={()=>setImgErr(true)}/>
        :<div className="prod-img-fallback">🍷</div>}
      <p className="font-bold leading-tight text-gray-200" style={{fontSize:'10px',lineHeight:'1.2'}}>{p.name}</p>
      <p className="gold-text font-bold" style={{fontSize:'11px'}}>€{p.price.toFixed(2)}</p>
      <button onClick={()=>onAdd(p)}
        className="w-full border gold-border gold-text rounded uppercase hover:bg-[#D4AF37] hover:text-black transition"
        style={{fontSize:'10px',padding:'3px 0'}}>
        + Add
      </button>
    </div>
  );
}

/* ── CartPanel ─────────────────────────────────────────────── */
function CartPanel({cart,totals,aRate,hasDuty,dl,addItem,removeItem,onSend,speed,setSpeed,spSel,noRate}){
  return(
    <div className="flex flex-col gap-2" style={{height:'100%'}}>

      {/* Avviso paese non coperto */}
      {noRate&&(
        <div className="bg-yellow-950 border border-yellow-700 rounded p-2 shrink-0">
          <p className="text-yellow-300 font-bold" style={{fontSize:'10px'}}>⚠️ We are not sure we can ship to your country.</p>
          <p className="text-yellow-500 mt-1" style={{fontSize:'9px'}}>Please complete your order anyway. We will contact you via email as soon as possible with a shipping quote.</p>
        </div>)}

      {/* Speed selector — tutto su un rigo compatto */}
      {spSel&&(
        <div className="border border-gray-700 rounded px-2 py-1 shrink-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-gray-500 uppercase shrink-0" style={{fontSize:'9px',letterSpacing:'0.05em'}}>Ship:</span>
            {['STANDARD','EXPRESS'].map(o=>(
              <button key={o} onClick={()=>setSpeed(o)}
                className={`px-2 rounded border font-bold uppercase transition shrink-0
                  ${speed===o?'gold-bg border-[#D4AF37]':'border-gray-700 text-gray-400 hover:border-[#D4AF37]'}`}
                style={{fontSize:'10px',padding:'2px 6px'}}>
                {o}
              </button>))}
            {dl&&<span className="gold-text font-bold" style={{fontSize:'10px'}}>{dl}</span>}
          </div>
        </div>)}

      {/* No speed — solo delivery label in oro */}
      {!spSel&&dl&&(
        <div className="shrink-0">
          <span className="gold-text font-bold" style={{fontSize:'10px'}}>⏱ {dl}</span>
        </div>)}

      {/* Items list — takes remaining height */}
      <div className="flex-1 overflow-y-auto space-y-1 min-h-0">
        {cart.length===0
          ?<p className="text-gray-500 italic text-center py-4" style={{fontSize:'12px'}}>Cart is empty</p>
          :cart.map(c=>(
            <div key={c.id} className="flex items-center bg-black rounded px-2 py-1 gap-2">
              <div className="flex-1 min-w-0">
                <p className="font-bold text-gray-200 truncate" style={{fontSize:'10px'}}>{c.name}</p>
                <p className="text-gray-400" style={{fontSize:'10px'}}>
                  €{c.price.toFixed(2)} ×{c.qty} = <span className="text-gray-300">€{(c.price*c.qty).toFixed(2)}</span>
                </p>
              </div>
              <div className="flex gap-1 shrink-0">
                <button onClick={()=>removeItem(c.id)} className="w-6 h-6 bg-gray-800 rounded hover:bg-red-700 font-bold text-sm">−</button>
                <button onClick={()=>addItem(c)} className="w-6 h-6 gold-bg rounded font-bold text-sm">+</button>
              </div>
            </div>))}
      </div>

      {/* Totals */}
      <div className="border-t border-gray-800 pt-2 shrink-0" style={{fontSize:'11px'}}>
        <div className="flex justify-between text-gray-400"><span>Products ({totals.qty}):</span><span>€{totals.prod.toFixed(2)}</span></div>
        {hasDuty&&<div className="flex justify-between text-gray-400"><span>Duties 10%:</span><span>€{totals.duty.toFixed(2)}</span></div>}
        <div className="flex justify-between text-gray-400"><span>Shipping:</span><span className="text-white"><span className="text-gray-300 mr-1" style={{fontSize:'10px'}}>{tierLabel(totals.qty)}</span>€{totals.ship.toFixed(2)}</span></div>
        {totals.qty>0&&!aRate&&<p className="text-yellow-600 text-right" style={{fontSize:'10px'}}>⚠️ No shipping rate for this country — you will be contacted via email.</p>}
        <div className="flex justify-between font-bold gold-text border-t border-gray-800 pt-1 mt-1" style={{fontSize:'13px'}}>
          <span>TOTAL:</span><span>€{totals.final.toFixed(2)}</span>
        </div>
      </div>

      {/* Send */}
      <button onClick={onSend} disabled={cart.length===0}
        className={`w-full rounded font-bold uppercase transition shrink-0
          ${cart.length>0?'bg-green-600 hover:bg-green-500 text-white':'bg-gray-800 text-gray-500 cursor-not-allowed'}`}
        style={{fontSize:'12px',padding:'8px 0'}}>
        📲 Send Order via WhatsApp
      </button>
    </div>
  );
}

/* ── CatalogStep ───────────────────────────────────────────── */
function CatalogStep({products,cart,setCart,speed,setSpeed,spSel,
  aRate,aKey,hasDuty,dl,totals,onSend,natCode,province}){

  const [tab,setTab]         = useState('ALL');
  const [cartErr,setCartErr] = useState('');

  const isUSCA = ['US','CA'].includes(natCode);
  const isCA   = natCode==='CA';
  const caBlock = isCA&&province&&CA_NO_WINE.some(p=>province.toUpperCase().includes(p));

  const avail   = isUSCA?products.filter(p=>p.category!=='DISTILLATES'&&!US_CA_BLOCK.includes(p.id)):products;
  const visCats = isUSCA?CATEGORIES.filter(c=>c!=='DISTILLATES'):CATEGORIES;
  const tabs    = ['ALL',...visCats];
  const filtered= tab==='ALL'?avail:avail.filter(p=>p.category===tab);
  const dCats   = tab==='ALL'?visCats.filter(c=>avail.some(p=>p.category===c)):[tab];

  const addItem=(prod)=>{
    setCartErr('');
    // Max 36 articoli totali
    const currentQty=cart.reduce((s,i)=>s+i.qty,0);
    if(currentQty>=36){
      setCartErr('⚠️ Maximum 36 items per order. Cannot add more.');
      return;
    }
    if(isCA){
      // WINE e SPARKLING sono "alcolici": possono stare assieme ma non con altre categorie
      const isAlc  = c => c==='WINE'||c==='SPARKLING';
      const iA     = isAlc(prod.category);
      const hasAlc = cart.some(i=>isAlc(i.category));
      const hasOth = cart.some(i=>!isAlc(i.category));
      if(iA&&hasOth){
        setCartErr('🍷 In Canada, wine/sparkling cannot be shipped with other products. Place a separate order.');
        return;
      }
      if(!iA&&hasAlc){
        setCartErr('🍷 In Canada, wine/sparkling cannot be shipped with other products. Place a separate order.');
        return;
      }
      if(iA&&caBlock){
        setCartErr(`🚫 Wine/Sparkling cannot be shipped to ${province}.`);
        return;
      }
    }
    setCart(prev=>{
      const ex=prev.find(p=>p.id===prod.id);
      if(ex) return prev.map(p=>p.id===prod.id?{...p,qty:p.qty+1}:p);
      return [...prev,{...prod,qty:1}];
    });
  };
  const removeItem=(id)=>{setCartErr('');setCart(prev=>prev.map(p=>p.id===id?{...p,qty:p.qty-1}:p).filter(p=>p.qty>0));};

  const panelProps={cart,totals,aRate,hasDuty,dl,addItem,removeItem,onSend,speed,setSpeed,spSel,noRate:totals.qty>0&&!aRate};

  return(
    <div className="catalog-page">
      {cartErr&&<div className="bg-red-950 border border-red-700 rounded p-2 text-xs text-red-300 shrink-0 mb-1">{cartErr}</div>}

      <div className="catalog-layout">

        {/* ── Catalog column ── */}
        <div className="catalog-col">
          {/* Category tabs */}
          <div className="flex gap-1 flex-wrap mb-2">
            {tabs.map(t=>(
              <button key={t} onClick={()=>setTab(t)}
                className={`px-2 py-1 rounded font-bold uppercase border transition
                  ${tab===t?'gold-bg border-[#D4AF37]':'border-gray-700 text-gray-400 hover:border-[#D4AF37]'}`}
                style={{fontSize:'10px'}}>
                {t}
              </button>))}
          </div>

          {dCats.map(cat=>{
            const ps=filtered.filter(p=>p.category===cat);
            if(!ps.length) return null;
            return(
              <div key={cat} className="mb-4">
                <h2 className="font-bold gold-text border-b border-gray-800 pb-1 mb-2" style={{fontSize:'13px'}}>{cat}</h2>
                {isUSCA&&cat==='EVO OIL'&&<p className="text-yellow-600 mb-1" style={{fontSize:'10px'}}>⚠️ Large formats (3L/5L) not available for US/Canada.</p>}
                {/* auto-fill: ~4 cols on mobile (80px min), ~3-4 cols on desktop (120px min) */}
                <div className="grid gap-2 prod-grid">
                  {ps.map(p=><ProductCard key={p.id} p={p} onAdd={addItem}/>)}
                </div>
              </div>);
          })}
        </div>

        {/* ── Cart column ── */}
        <div className="cart-col bg-[#111] rounded border gold-border" style={{padding:'8px'}}>
          <h2 className="gold-text font-bold border-b border-gray-800 pb-1 mb-2" style={{fontSize:'13px'}}>🛒 Cart</h2>
          <CartPanel {...panelProps}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
